<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STAKES: Nightmare Edition</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; color: white; user-select: none; touch-action: none; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* СТИЛИ ДЛЯ ШУМА */
        #noise { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; opacity: 0.08; image-rendering: pixelated; }

        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        #menu, #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a0000, #000); z-index: 20; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; text-align: center; }
        #game-over { display: none; }
        h1 { font-size: clamp(2rem, 10vw, 4rem); color: #ff0000; text-shadow: 0 0 20px #f00; margin: 10px; letter-spacing: 5px; }
        .controls { display: none; justify-content: center; gap: 15px; padding-bottom: 50px; pointer-events: auto; flex-wrap: wrap; }
        button { padding: 15px 30px; font-size: 1.2rem; font-family: inherit; background: #111; color: #fff; border: 2px solid #444; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover, button:active { background: #ff0000; color: #000; border-color: #fff; }
        button:disabled { opacity: 0.2; pointer-events: none; }
        #status { text-align: center; font-size: 1.5rem; padding-top: 40px; text-shadow: 2px 2px 5px #000; height: 60px; text-transform: uppercase; letter-spacing: 2px; }
        #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; pointer-events: none; display: none; overflow: hidden; }
        .blood { position: absolute; background: #800; border-radius: 50%; filter: blur(8px); opacity: 0.8; }
        .top-btn { padding: 10px 15px; font-size: 1.5rem; background: rgba(0,0,0,0.7); border: 1px solid #444; color: #fff; cursor: pointer; pointer-events: auto; }
        .btn-group { position: fixed; top: 20px; right: 20px; z-index: 30; pointer-events: auto; display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>STAKES</h1>
        <p style="color:#888">Nightmare Edition</p>
        <button id="start-btn">ПРИНЯТЬ ПАРИ</button>
    </div>

    <div id="game-over">
        <h1 id="go-title">КОНЕЦ</h1>
        <button onclick="location.reload()">ЗАНОВО</button>
    </div>

    <div id="damage-overlay"></div>

    <div id="ui-layer">
        <div id="status">ОЖИДАНИЕ...</div>
        <div class="controls" id="controls">
            <button id="take-btn" style="display:none;">ВЗЯТЬ ПИСТОЛЕТ</button>
            <button id="spin-btn">КРУТИТЬ</button>
            <button id="shoot-btn">ВЫСТРЕЛ</button>
        </div>
    </div>

    <div class="btn-group">
        <button id="mute-btn" class="top-btn">🔊</button>
    </div>

    <canvas id="noise"></canvas>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        let scene, camera, renderer, gunGroup, cylinderMesh, enemyGroup, enemyArm, enemyHead;
        let mainLight, ambientLight, lampBulb;
        let audioCtx, droneOsc, droneGain;
        let bulletPos = 0, currentChamber = 0, state = 'MENU';
        let gunTargetPos = new THREE.Vector3(), gunTargetRot = new THREE.Euler();
        let shakeOffset = new THREE.Vector3();
        let enemyDead = false;

        // ---------- ОПТИМИЗИРОВАННЫЙ ШУМ ----------
        const noiseCanvas = document.getElementById('noise');
        const noiseCtx = noiseCanvas.getContext('2d');
        const noiseFrames = [];
        let currentNoiseFrame = 0;

        function initNoise() {
            noiseCanvas.width = 256; 
            noiseCanvas.height = 256;
            for (let f = 0; f < 10; f++) {
                const idata = noiseCtx.createImageData(256, 256);
                const buffer32 = new Uint32Array(idata.data.buffer);
                for (let i = 0; i < buffer32.length; i++) {
                    if (Math.random() < 0.5) buffer32[i] = 0xff000000;
                }
                noiseFrames.push(idata);
            }
        }

        function updateNoise() {
            currentNoiseFrame = (currentNoiseFrame + 1) % noiseFrames.length;
            noiseCtx.putImageData(noiseFrames[currentNoiseFrame], 0, 0);
        }

        // ---------- ЗВУК ----------
        const Sound = {
            init() {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                this.startBackground();
            },
            startBackground() {
                droneGain = audioCtx.createGain();
                droneOsc = audioCtx.createOscillator();
                droneOsc.type = 'sawtooth';
                droneOsc.frequency.value = 35;
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass'; filter.frequency.value = 150;
                droneGain.gain.value = 0.08;
                droneOsc.connect(filter); filter.connect(droneGain);
                droneGain.connect(audioCtx.destination);
                droneOsc.start();
            },
            play(type) {
                if (!audioCtx || audioCtx.state !== 'running') return;
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                
                if (type === 'click') {
                    o.frequency.value = 600; g.gain.value = 0.1;
                    o.start(); o.stop(audioCtx.currentTime + 0.05);
                } else if (type === 'shot') {
                    o.type = 'square'; o.frequency.value = 40; g.gain.value = 1.0;
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
                    o.start(); o.stop(audioCtx.currentTime + 0.8);
                    mainLight.color.setHex(0xff0000); mainLight.intensity = 5;
                    setTimeout(() => { mainLight.color.setHex(0xffccaa); mainLight.intensity = 1.2; }, 120);
                } else if (type === 'spin') {
                    for (let i = 0; i < 15; i++) setTimeout(() => this.play('click'), i * 50);
                }
            }
        };

        // ---------- ИНИЦИАЛИЗАЦИЯ ИГРЫ ----------
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x020005, 3, 25);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 2.5);

            // Оптимизация рендера для смартфонов (Redmi)
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            renderer.domElement.id = 'game-canvas';

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            ambientLight = new THREE.AmbientLight(0x0a0515, 0.6); scene.add(ambientLight);
            mainLight = new THREE.PointLight(0xffccaa, 1.2, 15);
            mainLight.position.set(0, 2.8, 0); mainLight.castShadow = true;
            scene.add(mainLight);

            lampBulb = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshBasicMaterial({color:0xfffee0}));
            lampBulb.position.copy(mainLight.position); scene.add(lampBulb);

            initNoise();
            buildRoom();
            buildEnemy();
            buildGun();
            animate();
        }

        // ---------- ОКРУЖЕНИЕ ----------
        function buildRoom() {
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.9 });
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), wallMat); floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);
            const ceil = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), wallMat); ceil.rotation.x = Math.PI/2; ceil.position.y = 5; scene.add(ceil);
            
            const leftW = new THREE.Mesh(new THREE.PlaneGeometry(10, 5), wallMat); leftW.rotation.y = Math.PI/2; leftW.position.set(-4, 2.5, 0); scene.add(leftW);
            const rightW = new THREE.Mesh(new THREE.PlaneGeometry(10, 5), wallMat); rightW.rotation.y = -Math.PI/2; rightW.position.set(4, 2.5, 0); scene.add(rightW);
            
            // Стена с окном
            const bLeft = new THREE.Mesh(new THREE.PlaneGeometry(2, 5), wallMat); bLeft.position.set(-3, 2.5, -4); scene.add(bLeft);
            const bRight = new THREE.Mesh(new THREE.PlaneGeometry(2, 5), wallMat); bRight.position.set(3, 2.5, -4); scene.add(bRight);
            const bTop = new THREE.Mesh(new THREE.PlaneGeometry(4, 1.5), wallMat); bTop.position.set(0, 4.25, -4); scene.add(bTop);
            const bBot = new THREE.Mesh(new THREE.PlaneGeometry(4, 1), wallMat); bBot.position.set(0, 0.5, -4); scene.add(bBot);

            const table = new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 2.2), new THREE.MeshStandardMaterial({ color: 0x22110a, roughness: 0.8 }));
            table.position.set(0, 0.9, 0.5); table.receiveShadow = true; scene.add(table);

            // Вид из окна
            const moon = new THREE.Mesh(new THREE.SphereGeometry(1.5, 16, 16), new THREE.MeshBasicMaterial({color: 0xaa1100}));
            moon.position.set(4, 6, -15); scene.add(moon);
        }

        function buildEnemy() {
            enemyGroup = new THREE.Group();
            const suitMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const skinMat = new THREE.MeshStandardMaterial({ color: 0x550000 });
            
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.4, 0.4), suitMat);
            torso.position.y = 1.6; enemyGroup.add(torso);
            
            enemyHead = new THREE.Group();
            enemyHead.position.y = 2.6;
            const headMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.15, 0.5, 8), skinMat);
            enemyHead.add(headMesh);

            const eyeMat = new THREE.MeshBasicMaterial({color: 0xffaa00});
            const eL = new THREE.Mesh(new THREE.SphereGeometry(0.03), eyeMat); eL.position.set(-0.1, 0.05, 0.18); enemyHead.add(eL);
            const eR = new THREE.Mesh(new THREE.SphereGeometry(0.03), eyeMat); eR.position.set(0.1, 0.05, 0.18); enemyHead.add(eR);

            enemyGroup.add(enemyHead);
            enemyArm = new THREE.Group();
            enemyArm.position.set(0.5, 2.2, 0.1);
            const armM = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.9, 0.2), suitMat);
            armM.position.y = -0.4; enemyArm.add(armM);
            enemyGroup.add(enemyArm);

            enemyGroup.position.z = -1.5;
            scene.add(enemyGroup);
        }

        function buildGun() {
            gunGroup = new THREE.Group();
            const mMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9, roughness: 0.2 });
            const wMat = new THREE.MeshStandardMaterial({ color: 0x3d2516, roughness: 0.8 });

            const frame = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.15, 0.3), mMat); gunGroup.add(frame);
            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 0.5, 12), mMat);
            barrel.rotation.x = Math.PI/2; barrel.position.set(0, 0.05, 0.35); gunGroup.add(barrel);
            
            cylinderMesh = new THREE.Group();
            const cylBody = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.2, 12), mMat);
            cylBody.rotation.x = Math.PI/2; cylinderMesh.add(cylBody);
            for (let i = 0; i < 6; i++) {
                const chamber = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.22, 8), new THREE.MeshBasicMaterial({color:0x000000}));
                chamber.rotation.x = Math.PI/2;
                const angle = (i/6) * Math.PI*2;
                chamber.position.set(Math.cos(angle)*0.06, Math.sin(angle)*0.06, 0);
                cylinderMesh.add(chamber);
            }
            cylinderMesh.position.z = 0.05; gunGroup.add(cylinderMesh);

            const grip = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.3, 0.15), wMat);
            grip.position.set(0, -0.2, -0.05); grip.rotation.x = 0.4; gunGroup.add(grip);
            
            const guard = new THREE.Mesh(new THREE.TorusGeometry(0.05, 0.01, 8, 12, Math.PI), mMat);
            guard.position.set(0, -0.08, 0.1); guard.rotation.y = Math.PI/2; gunGroup.add(guard);

            scene.add(gunGroup);
            updateGunPlacement('TABLE_ENEMY');
        }

        // ---------- ЛОГИКА ПЕРЕМЕЩЕНИЯ ОРУЖИЯ ----------
        function safeAttach(parent, child) {
            if (!child || !parent) return;
            scene.updateMatrixWorld(true);
            const pos = new THREE.Vector3();
            const quat = new THREE.Quaternion();
            child.matrixWorld.decompose(pos, quat, new THREE.Vector3());
            parent.add(child);
            child.position.copy(parent.worldToLocal(pos));
        }

        function updateGunPlacement(type) {
            if (type === 'TABLE_ENEMY') { 
                safeAttach(scene, gunGroup); gunTargetPos.set(0, 1, -0.3); gunTargetRot.set(0, Math.PI/2, 0); 
            } else if (type === 'TABLE_PLAYER') { 
                safeAttach(scene, gunGroup); gunTargetPos.set(0, 1, 1.3); gunTargetRot.set(0, -Math.PI/2, 0); 
            } else if (type === 'PLAYER_HAND') { 
                safeAttach(camera, gunGroup); gunTargetPos.set(0.4, -0.4, -0.8); gunTargetRot.set(0, 0, 0); 
            } else if (type === 'PLAYER_SPIN') { 
                safeAttach(camera, gunGroup); gunTargetPos.set(0, -0.2, -0.6); gunTargetRot.set(0.5, Math.PI * 0.5, 0);
            } else if (type === 'PLAYER_AIM') { 
                safeAttach(camera, gunGroup); gunTargetPos.set(0, -0.1, -0.4); gunTargetRot.set(0, 0, 0); 
            } else if (type === 'ENEMY_AIM_HEAD') { 
                safeAttach(enemyArm, gunGroup); gunTargetPos.set(0, -0.9, 0.1); gunTargetRot.set(Math.PI/2, 0, -Math.PI/2); 
            }
        }

        // ---------- ЛОГИКА ИГРЫ ----------
        function startGame() {
            Sound.init();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('damage-overlay').style.display = 'none';
            document.getElementById('damage-overlay').innerHTML = '';
            
            bulletPos = Math.floor(Math.random() * 6);
            currentChamber = 0;
            enemyTurn();
        }

        function enemyTurn() {
            state = 'ENEMY';
            document.getElementById('status').innerText = "ДИЛЕР КРУТИТ...";
            updateGunPlacement('TABLE_ENEMY');
            
            setTimeout(() => {
                Sound.play('spin');
                let spins = 0;
                const eInt = setInterval(() => {
                    cylinderMesh.rotation.z += 1.2;
                    spins++;
                    if (spins > 15) {
                        clearInterval(eInt);
                        bulletPos = Math.floor(Math.random() * 6); // Скрытый рандом дилера
                        currentChamber = 0;
                        document.getElementById('status').innerText = "ХОД ДИЛЕРА...";
                        updateGunPlacement('ENEMY_AIM_HEAD');
                        
                        setTimeout(() => {
                            enemyArm.rotation.x = -Math.PI * 0.85; 
                            setTimeout(() => {
                                if (currentChamber === bulletPos) {
                                    Sound.play('shot'); enemyDead = true; enemyHead.visible = false;
                                    state = 'END'; setTimeout(() => location.reload(), 4000);
                                } else {
                                    Sound.play('click'); 
                                    currentChamber = (currentChamber + 1) % 6; // ИСПРАВЛЕНО
                                    handover();
                                }
                            }, 1000);
                        }, 500);
                    }
                }, 60);
            }, 500);
        }

        function handover() {
            enemyArm.rotation.x = 0;
            updateGunPlacement('TABLE_PLAYER');
            document.getElementById('status').innerText = "ТВОЙ ХОД";
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('take-btn').style.display = 'block';
            document.getElementById('spin-btn').style.display = 'none';
            document.getElementById('shoot-btn').style.display = 'none';
        }

        // ВЗАИМОДЕЙСТВИЕ
        document.getElementById('take-btn').onclick = () => {
            Sound.play('click');
            updateGunPlacement('PLAYER_HAND');
            document.getElementById('take-btn').style.display = 'none';
            document.getElementById('spin-btn').style.display = 'block';
            document.getElementById('shoot-btn').style.display = 'block';
            state = 'PLAYER_READY';
        };

        document.getElementById('spin-btn').onclick = () => {
            Sound.play('spin');
            document.getElementById('spin-btn').disabled = true;
            document.getElementById('shoot-btn').disabled = true;
            updateGunPlacement('PLAYER_SPIN');
            
            let spins = 0;
            const int = setInterval(() => {
                cylinderMesh.rotation.z += 1.5;
                spins++;
                if (spins > 20) {
                    clearInterval(int);
                    bulletPos = Math.floor(Math.random() * 6);
                    currentChamber = 0;
                    document.getElementById('spin-btn').disabled = false;
                    document.getElementById('shoot-btn').disabled = false;
                    document.getElementById('status').innerText = "ГОТОВО";
                    updateGunPlacement('PLAYER_HAND');
                }
            }, 50);
        };

        document.getElementById('shoot-btn').onclick = () => {
            state = 'PLAYER_AIMING';
            updateGunPlacement('PLAYER_AIM');
            document.getElementById('controls').style.display = 'none';
            
            setTimeout(() => {
                if (currentChamber === bulletPos) {
                    Sound.play('shot'); showDeathFX();
                    state = 'END'; setTimeout(() => document.getElementById('game-over').style.display = 'flex', 2000);
                } else {
                    Sound.play('click'); 
                    currentChamber = (currentChamber + 1) % 6; // ИСПРАВЛЕНО
                    document.getElementById('status').innerText = "ОСЕЧКА";
                    setTimeout(enemyTurn, 1000);
                }
            }, 800);
        };

        function showDeathFX() {
            const ov = document.getElementById('damage-overlay');
            ov.style.display = 'block';
            for (let i = 0; i < 15; i++) {
                const b = document.createElement('div'); b.className = 'blood';
                b.style.width = b.style.height = (50 + Math.random() * 200) + 'px';
                b.style.left = Math.random() * 100 + '%'; b.style.top = Math.random() * 100 + '%';
                ov.appendChild(b);
            }
        }

        // ---------- АНИМАЦИЯ ----------
        function animate() {
            requestAnimationFrame(animate);
            updateNoise();

            const time = Date.now() * 0.001;
            mainLight.intensity = 1.0 + Math.sin(time * 15) * 0.15 + (Math.random()*0.1);

            if (enemyDead && enemyGroup.rotation.x > -Math.PI / 2) {
                enemyGroup.rotation.x -= 0.05;
                enemyGroup.position.z -= 0.02;
            }

            if (state === 'PLAYER_AIMING') {
                shakeOffset.set((Math.random() - 0.5) * 0.02, (Math.random() - 0.5) * 0.02, 0);
                camera.position.add(shakeOffset);
            } else {
                camera.position.lerp(new THREE.Vector3(0, 1.6, 2.5), 0.1);
            }

            gunGroup.position.lerp(gunTargetPos, 0.15);
            gunGroup.quaternion.slerp(new THREE.Quaternion().setFromEuler(gunTargetRot), 0.15);

            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('mute-btn').onclick = () => {
            if (!audioCtx) return;
            if (audioCtx.state === 'running') { audioCtx.suspend(); document.getElementById('mute-btn').innerText = '🔇'; }
            else { audioCtx.resume(); document.getElementById('mute-btn').innerText = '🔊'; }
        };

        init();
    </script>
</body>
</html>
