<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Russian Roulette Mobile</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --accent-color: #e74c3c;
            --gold: #d4af37;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Предупреждение о повороте экрана */
        #orientation-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        @media (orientation: portrait) {
            #orientation-overlay { display: flex; }
        }

        /* Основной контейнер */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            background: radial-gradient(circle, #2c3e50 0%, #000 100%);
        }

        /* Барабан револьвера */
        #cylinder-container {
            position: relative;
            width: 200px;
            height: 200px;
            border: 5px solid #444;
            border-radius: 50%;
            transition: transform 1s cubic-bezier(0.1, 0.7, 0.1, 1);
            background: #333;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .chamber {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #111;
            border-radius: 50%;
            border: 2px solid #555;
            top: 50%; left: 50%;
            margin: -20px;
        }

        /* Кнопки */
        .controls {
            display: flex;
            gap: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.3s;
        }

        #spin-btn { background-color: var(--gold); color: #000; }
        #fire-btn { background-color: var(--accent-color); color: #fff; }
        
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #status {
            font-size: 1.5rem;
            height: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Полноэкранный запрос */
        #fs-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
    </style>
</head>
<body>

    <div id="orientation-overlay">
        <h2>🔄 Пожалуйста, переверните устройство в ландшафтный режим</h2>
    </div>

    <div id="fs-overlay">
        <button id="start-btn" style="background: var(--gold); padding: 20px 40px;">ИГРАТЬ (Full Screen)</button>
    </div>

    <div id="game-container">
        <div id="status">Нажмите "КРУТИТЬ"</div>
        
        <div id="cylinder-container">
            </div>

        <div class="controls">
            <button id="spin-btn">Крутить</button>
            <button id="fire-btn" disabled>Спустить курок</button>
        </div>
    </div>

    <script>
        const cylinder = document.getElementById('cylinder-container');
        const spinBtn = document.getElementById('spin-btn');
        const fireBtn = document.getElementById('fire-btn');
        const statusText = document.getElementById('status');
        const fsOverlay = document.getElementById('fs-overlay');
        const startBtn = document.getElementById('start-btn');

        let bulletPosition = -1;
        let currentChamber = 0;
        let isSpinning = false;

        // Создаем визуальные каморы
        for (let i = 0; i < 6; i++) {
            const chamber = document.createElement('div');
            chamber.className = 'chamber';
            const angle = (i * 60) * (Math.PI / 180);
            const radius = 70;
            const x = Math.round(radius * Math.cos(angle));
            const y = Math.round(radius * Math.sin(angle));
            chamber.style.transform = `translate(${x}px, ${y}px)`;
            cylinder.appendChild(chamber);
        }

        // Полноэкранный режим
        startBtn.addEventListener('click', () => {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
            // Попытка заблокировать ориентацию (работает не во всех браузерах)
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(e => console.log("Orientation lock not supported"));
            }
            fsOverlay.style.display = 'none';
        });

        // Логика вращения
        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;
            
            isSpinning = true;
            fireBtn.disabled = true;
            statusText.innerText = "Барабан вращается...";
            
            // Рандомная позиция пули (0-5)
            bulletPosition = Math.floor(Math.random() * 6);
            currentChamber = 0;

            // Анимация вращения (несколько полных оборотов + рандом)
            const extraDegrees = 1800 + (Math.floor(Math.random() * 6) * 60);
            cylinder.style.transform = `rotate(${extraDegrees}deg)`;

            setTimeout(() => {
                isSpinning = false;
                fireBtn.disabled = false;
                statusText.innerText = "Готов?";
                // Сбрасываем угол визуально для чистоты следующего вращения
                cylinder.style.transition = 'none';
                cylinder.style.transform = 'rotate(0deg)';
                setTimeout(() => cylinder.style.transition = 'transform 1s cubic-bezier(0.1, 0.7, 0.1, 1)', 50);
            }, 1000);
        });

        // Логика выстрела
        fireBtn.addEventListener('click', () => {
            if (currentChamber === bulletPosition) {
                statusText.innerText = "💥 БАБАХ! ВЫ ПРОИГРАЛИ!";
                statusText.style.color = "var(--accent-color)";
                fireBtn.disabled = true;
                vibratePhone(500);
                
                setTimeout(() => {
                    statusText.style.color = "white";
                    statusText.innerText = "Нажмите 'КРУТИТЬ'";
                }, 3000);
            } else {
                statusText.innerText = "*Клик*... Вам повезло.";
                currentChamber++;
                vibratePhone(50);
                
                if (currentChamber >= 6) {
                    statusText.innerText = "Пули нет. Крутите снова.";
                    fireBtn.disabled = true;
                }
            }
        });

        function vibratePhone(ms) {
            if (navigator.vibrate) {
                navigator.vibrate(ms);
            }
        }
    </script>
</body>
</html>
