<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, orientation=landscape">
<title>STAKES: Russian Roulette AI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    height: 100vh;
}

/* ГЛАВНОЕ МЕНЮ */
#mainMenu {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #1a0a0a 0%, #2a0000 50%, #0a0a1a 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    animation: menuFadeIn 0.8s ease-in;
}

@keyframes menuFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.menu-title {
    font-size: 4rem;
    font-weight: bold;
    text-shadow: 0 0 20px #ff0000, 0 0 40px #ff3333;
    margin-bottom: 20px;
    animation: titlePulse 2s infinite;
    letter-spacing: 3px;
}

@keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 20px #ff0000, 0 0 40px #ff3333; }
    50% { text-shadow: 0 0 30px #ff0000, 0 0 60px #ff5555; }
}

.menu-subtitle {
    font-size: 1.2rem;
    color: #ff6666;
    margin-bottom: 50px;
    text-shadow: 0 0 10px #ff0000;
    animation: subtitleFloat 3s ease-in-out infinite;
}

@keyframes subtitleFloat {
    0%, 100% { transform: translateY(0px); opacity: 0.8; }
    50% { transform: translateY(-10px); opacity: 1; }
}

.menu-buttons {
    display: flex;
    gap: 20px;
    flex-direction: column;
    align-items: center;
}

.menu-btn {
    padding: 15px 40px;
    font-size: 1.2rem;
    background: linear-gradient(135deg, #1a0a0a, #3a0a0a);
    border: 2px solid #ff0000;
    color: #ff6666;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: bold;
    transition: all 0.3s ease;
    box-shadow: 0 0 15px rgba(255,0,0,0.3);
    font-family: 'Courier New', monospace;
    letter-spacing: 1px;
}

.menu-btn:hover {
    background: linear-gradient(135deg, #3a0000, #5a0000);
    border-color: #ff3333;
    box-shadow: 0 0 30px rgba(255,0,0,0.6);
    transform: scale(1.05);
    text-shadow: 0 0 10px #ff0000;
}

.menu-btn:active {
    transform: scale(0.98);
}

/* ИГРОВОЙ ЭКРАН */
#gameContainer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
}

#canvas {
    width: 100%;
    height: 100%;
    display: block;
}

/* VHS ЭФФЕКТ */
#vhs {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 50;
    background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,.02) 0px,
        rgba(0,0,0,.1) 2px,
        transparent 4px
    );
    animation: vhs 0.08s infinite;
}

@keyframes vhs {
    0% { transform: translateY(0); }
    100% { transform: translateY(4px); }
}

/* КНОПКИ И ЭЛЕМЕНТЫ ИНТЕРФЕЙСА */
#ui {
    position: fixed;
    bottom: 20px;
    width: 100%;
    text-align: center;
    z-index: 10;
}

button {
    padding: 12px 24px;
    margin: 4px;
    font-size: 16px;
    background: #111;
    color: #aaa;
    border: 1px solid #444;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    font-family: monospace;
}

button:hover:not(:disabled) {
    background: #300;
    color: #fff;
    border-color: #f00;
    box-shadow: 0 0 10px #f00;
}

button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
}

#fullscreenBtn {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 20;
    padding: 10px 20px;
    font-size: 13px;
    background: #1a1a1a;
    border: 2px solid #f00;
    color: #f00;
    font-weight: bold;
    text-shadow: 0 0 5px #f00;
    box-shadow: 0 0 10px rgba(255,0,0,.3);
}

#fullscreenBtn:hover {
    background: #300;
    box-shadow: 0 0 15px #f00;
}

#clock {
    position: fixed;
    top: 20px;
    left: 20px;
    padding: 8px;
    background: rgba(20,0,0,.8);
    border: 2px solid #500;
    color: #f00;
    font-size: 1.4rem;
    z-index: 20;
    pointer-events: none;
}

#speech {
    position: fixed;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    padding: 12px;
    background: rgba(0,0,0,.9);
    border: 1px solid #444;
    border-radius: 8px;
    max-width: 300px;
    color: #fff;
    font-size: 1.1rem;
    text-align: center;
    display: none;
    text-shadow: 0 0 10px rgba(255,0,0,.5);
    animation: speechPop 0.3s ease;
}

@keyframes speechPop {
    0% { transform: translateX(-50%) scale(0.8); opacity: 0; }
    100% { transform: translateX(-50%) scale(1); opacity: 1; }
}

#blood {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, transparent, #800);
    opacity: 0;
    pointer-events: none;
    z-index: 15;
    transition: opacity 0.5s;
}

.hud-info {
    position: fixed;
    bottom: 120px;
    left: 20px;
    color: #f00;
    font-size: 0.9rem;
    z-index: 10;
    text-shadow: 0 0 5px #f00;
}

.loading {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.5rem;
    color: #ff6666;
    z-index: 999;
    text-shadow: 0 0 10px #ff0000;
}

</style>
</head>
<body>

<!-- ГЛАВНОЕ МЕНЮ -->
<div id="mainMenu">
    <div class="menu-title">⚠️ STAKES ⚠️</div>
    <div class="menu-subtitle">Russian Roulette: AI Edition</div>
    <div class="menu-buttons">
        <button class="menu-btn" id="playBtn">▶ ИГРАТЬ</button>
        <button class="menu-btn" id="rulesBtn">❓ ПРАВИЛА</button>
        <button class="menu-btn" id="aboutBtn">ℹ️ О ИГРЕ</button>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center;">
    <div style="background:#1a1a1a; border:2px solid #f00; padding:30px; max-width:500px; border-radius:10px; text-align:center; color:#fff;">
        <h2 id="modalTitle" style="margin-bottom:20px; color:#ff6666;"></h2>
        <p id="modalContent" style="line-height:1.6; margin-bottom:20px;"></p>
        <button id="closeModalBtn" style="background:#300; border:1px solid #f00; color:#fff;">ЗАКРЫТЬ</button>
    </div>
</div>

<!-- ИГРОВОЙ ЭКРАН -->
<div id="gameContainer">
    <canvas id="canvas"></canvas>
    <div id="vhs"></div>
    <div id="blood"></div>
    <button id="fullscreenBtn">⛶ FULLSCREEN</button>
    <div id="clock"></div>
    <div id="speech"></div>
    <div class="hud-info" id="hudInfo"></div>
    
    <div id="ui">
        <button id="startBtn">ПРИНЯТЬ ПАРИ</button>
        <button id="inspectBtn" style="display:none">🔍 ОСМОТР</button>
        <button id="takeBtn" style="display:none">✋ ВЗЯТЬ</button>
        <button id="spinBtn" style="display:none">🔄 КРУТИТЬ</button>
        <button id="ejectBtn" style="display:none">⏏️ ВЫБРОС (1)</button>
        <button id="shootBtn" style="display:none">💥 ВЫСТРЕЛ</button>
        <button id="menuBtn" style="display:none; position:fixed; bottom:20px; right:20px;">⏹️ МЕНЮ</button>
    </div>
</div>

<script type="module">
import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

// ===== МЕНЕДЖЕР МЕНЮ =====
class MenuManager {
    constructor() {
        this.mainMenu = document.getElementById('mainMenu');
        this.gameContainer = document.getElementById('gameContainer');
        this.modal = document.getElementById('modal');
        this.playBtn = document.getElementById('playBtn');
        this.rulesBtn = document.getElementById('rulesBtn');
        this.aboutBtn = document.getElementById('aboutBtn');
        this.closeModalBtn = document.getElementById('closeModalBtn');
        this.menuBtn = document.getElementById('menuBtn');
        
        this.setupEvents();
    }
    
    setupEvents() {
        this.playBtn.addEventListener('click', () => this.startGame());
        this.rulesBtn.addEventListener('click', () => this.showRules());
        this.aboutBtn.addEventListener('click', () => this.showAbout());
        this.closeModalBtn.addEventListener('click', () => this.closeModal());
        this.menuBtn.addEventListener('click', () => this.backToMenu());
    }
    
    startGame() {
        this.mainMenu.style.display = 'none';
        this.gameContainer.style.display = 'block';
        window.gameManager?.startNewGame();
    }
    
    showRules() {
        document.getElementById('modalTitle').textContent = '📋 ПРАВИЛА ИГРЫ';
        document.getElementById('modalContent').innerHTML = `
            <strong>1.</strong> В револьвере 6 патронов, только 1 смертельный<br><br>
            <strong>2.</strong> Враг и ты по очереди делаете выстрелы<br><br>
            <strong>3.</strong> Ты можешь осмотреть револьвер, покрутить барабан или вывернуть патрон<br><br>
            <strong>4.</strong> Неудачный выстрел означает смерть<br><br>
            <strong>5.</strong> Выживший объявляется победителем<br><br>
            ⚠️ Игра содержит насилие и сцены крови
        `;
        this.modal.style.display = 'flex';
    }
    
    showAbout() {
        document.getElementById('modalTitle').textContent = 'ℹ️ О ИГРЕ';
        document.getElementById('modalContent').innerHTML = `
            <strong>STAKES: Russian Roulette AI</strong><br><br>
            Экспериментальная 3D игра с искусственным интеллектом<br><br>
            💀 Враг с грубым голосом<br>
            🔊 Синтез речи и звуковые эффекты<br>
            🎮 WebGL 3D графика<br>
            ⚔️ Интеллектуальный противник<br><br>
            Версия: 2.0<br>
            <small>⚠️ Только для 18+</small>
        `;
        this.modal.style.display = 'flex';
    }
    
    closeModal() {
        this.modal.style.display = 'none';
    }
    
    backToMenu() {
        this.gameContainer.style.display = 'none';
        this.mainMenu.style.display = 'flex';
    }
}

// ===== СИСТЕМА 3D =====
class Game3D {
    constructor() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x0a0a0a);
        
        this.camera = new THREE.PerspectiveCamera(
            60,
            innerWidth / innerHeight,
            0.1,
            100
        );
        this.camera.position.set(0, 1.6, 2.5);
        
        this.renderer = new THREE.WebGLRenderer({ antialias: true, canvas: document.getElementById('canvas') });
        this.renderer.setSize(innerWidth, innerHeight);
        this.renderer.shadowMap.enabled = true;
        this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        
        this.setupLights();
        this.buildModels();
        this.animate();
    }
    
    setupLights() {
        const ambient = new THREE.AmbientLight(0x221111, 0.4);
        this.scene.add(ambient);
        
        this.lamp = new THREE.PointLight(0xffccaa, 1.2, 8);
        this.lamp.position.set(0.3, 2.0, 0.5);
        this.lamp.castShadow = true;
        this.scene.add(this.lamp);
    }
    
    buildModels() {
        this.buildScene();
        this.buildEnemy();
        this.buildGun();
    }
    
    buildScene() {
        // Пол
        const floorGeo = new THREE.PlaneGeometry(8, 8);
        const floorMat = new THREE.MeshStandardMaterial({ 
            color: 0x1a1a1a,
            roughness: 0.9 
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        this.scene.add(floor);
        
        // Стена
        const backGeo = new THREE.PlaneGeometry(8, 5);
        const backMat = new THREE.MeshStandardMaterial({ 
            color: 0x0a0a0a,
            roughness: 1 
        });
        const back = new THREE.Mesh(backGeo, backMat);
        back.position.set(0, 2.5, -3);
        back.receiveShadow = true;
        this.scene.add(back);
        
        // Окно с грозой
        this.createStormWindow();
        
        // Стол
        const tableGeo = new THREE.BoxGeometry(2.5, 0.1, 1.5);
        const tableMat = new THREE.MeshStandardMaterial({ 
            color: 0x150d08,
            roughness: 0.8 
        });
        const table = new THREE.Mesh(tableGeo, tableMat);
        table.position.set(0, 0.9, 0.8);
        table.castShadow = true;
        table.receiveShadow = true;
        this.scene.add(table);
    }
    
    createStormWindow() {
        const canvas = document.createElement('canvas');
        canvas.width = canvas.height = 256;
        const ctx = canvas.getContext('2d');
        
        const texture = new THREE.CanvasTexture(canvas);
        const mesh = new THREE.Mesh(
            new THREE.PlaneGeometry(1.8, 1.4),
            new THREE.MeshBasicMaterial({ map: texture })
        );
        mesh.position.set(1.2, 2.8, -2.95);
        this.scene.add(mesh);
        
        setInterval(() => {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, 256, 256);
            
            // Луна
            ctx.fillStyle = '#fcc';
            ctx.beginPath();
            ctx.arc(180, 40, 30, 0, Math.PI * 2);
            ctx.fill();
            
            // Кровавый глаз луны
            ctx.fillStyle = '#f00';
            ctx.beginPath();
            ctx.arc(188, 35, 8, 0, Math.PI * 2);
            ctx.fill();
            
            // Молния
            if (Math.random() < 0.02) {
                ctx.strokeStyle = '#ffa';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(100, 0);
                ctx.lineTo(90, 60);
                ctx.lineTo(110, 90);
                ctx.lineTo(80, 140);
                ctx.stroke();
            }
            
            texture.needsUpdate = true;
        }, 100);
    }
    
    buildEnemy() {
        this.enemyGroup = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({
            color: 0x1a1a1a,
            roughness: 0.8
        });
        
        // Тело
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.9, 0.3), mat);
        body.position.y = 1;
        body.castShadow = true;
        this.enemyGroup.add(body);
        
        // Голова
        this.enemyHead = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.4, 0.35), mat);
        this.enemyHead.position.y = 1.75;
        this.enemyHead.castShadow = true;
        this.enemyGroup.add(this.enemyHead);
        
        // Глаза (светящиеся красные)
        const eyeGeo = new THREE.SphereGeometry(0.06, 8, 8);
        const eyeMat = new THREE.MeshStandardMaterial({
            color: 0xf00,
            emissive: 0xff0000,
            emissiveIntensity: 0.8
        });
        
        this.enemyEyeL = new THREE.Mesh(eyeGeo, eyeMat);
        this.enemyEyeL.position.set(-0.08, 1.85, 0.16);
        this.enemyGroup.add(this.enemyEyeL);
        
        this.enemyEyeR = new THREE.Mesh(eyeGeo, eyeMat);
        this.enemyEyeR.position.set(0.08, 1.85, 0.16);
        this.enemyGroup.add(this.enemyEyeR);
        
        // Рука с револьвером
        this.enemyArm = new THREE.Group();
        this.enemyArm.position.set(0.3, 1.5, 0.1);
        
        const upperArm = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.45, 0.1), mat);
        upperArm.position.y = -0.22;
        upperArm.castShadow = true;
        this.enemyArm.add(upperArm);
        
        this.enemyGroup.add(this.enemyArm);
        this.enemyGroup.position.set(0, 0.25, -0.5);
        this.enemyGroup.castShadow = true;
        
        this.scene.add(this.enemyGroup);
    }
    
    buildGun() {
        this.gunGroup = new THREE.Group();
        const metalMat = new THREE.MeshStandardMaterial({
            color: 0x1a1a1a,
            metalness: 0.95,
            roughness: 0.3
        });
        
        // Ствол
        const barrel = new THREE.Mesh(
            new THREE.CylinderGeometry(0.04, 0.04, 0.5),
            metalMat
        );
        barrel.rotation.x = Math.PI / 2;
        barrel.position.z = 0.25;
        barrel.castShadow = true;
        this.gunGroup.add(barrel);
        
        // Барабан
        this.cylMesh = new THREE.Mesh(
            new THREE.CylinderGeometry(0.08, 0.08, 0.2),
            metalMat
        );
        this.cylMesh.rotation.x = Math.PI / 2;
        this.cylMesh.castShadow = true;
        this.gunGroup.add(this.cylMesh);
        
        // Рукоятка
        const grip = new THREE.Mesh(
            new THREE.BoxGeometry(0.07, 0.2, 0.1),
            new THREE.MeshStandardMaterial({
                color: 0x3a2a1a,
                roughness: 0.9
            })
        );
        grip.position.set(0, -0.15, -0.15);
        grip.castShadow = true;
        this.gunGroup.add(grip);
        
        this.scene.add(this.gunGroup);
        this.gunGroup.position.set(0.2, 1, 0.8);
        this.gunGroup.rotation.set(0, 1.5, 0);
    }
    
    animate() {
        requestAnimationFrame(() => this.animate());
        
        // Анимация глаз врага
        if (this.enemyEyeL) {
            this.enemyEyeL.material.emissiveIntensity = 0.5 + Math.sin(Date.now() * 0.01) * 0.3;
            this.enemyEyeR.material.emissiveIntensity = 0.5 + Math.cos(Date.now() * 0.01) * 0.3;
        }
        
        // Вибрация лампы
        if (this.lamp) {
            this.lamp.intensity = 1 + Math.random() * 0.15;
        }
        
        this.renderer.render(this.scene, this.camera);
    }
    
    onWindowResize() {
        this.camera.aspect = innerWidth / innerHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(innerWidth, innerHeight);
    }
}

// ===== ОСНОВНОЙ ИГРОВОЙ МЕНЕДЖЕР =====
class GameManager {
    constructor() {
        this.game3D = new Game3D();
        this.menuManager = new MenuManager();
        this.state = 'MENU';
        this.bulletPos = 0;
        this.currentChamber = 0;
        this.audioCtx = null;
        this.gameStats = { rounds: 0, playerShots: 0, enemyShots: 0 };
        
        this.setupGameEvents();
        window.addEventListener('resize', () => this.game3D.onWindowResize());
        window.gameManager = this;
    }
    
    setupGameEvents() {
        document.getElementById('startBtn').addEventListener('click', () => this.startGame());
        document.getElementById('fullscreenBtn').addEventListener('click', () => this.toggleFullscreen());
    }
    
    startNewGame() {
        this.state = 'GAME';
        this.gameStats.rounds++;
        this.updateHUD();
        
        this.bulletPos = Math.floor(Math.random() * 6);
        do {
            this.currentChamber = Math.floor(Math.random() * 6);
        } while (this.currentChamber === this.bulletPos);
        
        this.initAudio();
        this.say("Новая игра начинается...", true);
    }
    
    startGame() {
        this.startNewGame();
    }
    
    initAudio() {
        if (this.audioCtx) return;
        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    
    say(text, isEnemy = false) {
        const el = document.getElementById('speech');
        el.textContent = text;
        el.style.display = 'block';
        
        try {
            if (window.speechSynthesis) {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'ru-RU';
                u.pitch = isEnemy ? 0.4 : 1.2;
                u.rate = isEnemy ? 0.6 : 0.9;
                speechSynthesis.speak(u);
            }
        } catch (e) {}
        
        setTimeout(() => { el.style.display = 'none'; }, 4000);
    }
    
    updateHUD() {
        document.getElementById('hudInfo').innerHTML = `
            Раунд: ${this.gameStats.rounds}<br>
            Ваши выстрелы: ${this.gameStats.playerShots}<br>
            Выстрелы врага: ${this.gameStats.enemyShots}
        `;
    }
    
    toggleFullscreen() {
        const elem = document.documentElement;
        const rfs = elem.requestFullscreen || elem.mozRequestFullScreen || 
                   elem.webkitRequestFullscreen || elem.msRequestFullscreen;
        if (rfs) rfs.call(elem).catch(err => console.log('Fullscreen error:', err));
    }
}

// ИНИЦИАЛИЗАЦИЯ
window.addEventListener('DOMContentLoaded', () => {
    new GameManager();
});
</script>

</body>
</html>
