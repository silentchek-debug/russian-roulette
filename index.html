<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STAKES: Nightmare Edition</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050505; font-family: 'Courier New', Courier, monospace; color: #ccc; user-select: none; touch-action: none; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #noise { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; opacity: 0.12; image-rendering: pixelated; }

        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        #menu, #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a0a0a, #000); z-index: 20; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; text-align: center; }
        #game-over { display: none; }
        
        h1 { font-size: clamp(2rem, 8vw, 4rem); color: #800; text-shadow: 0 0 15px #f00; margin: 10px; letter-spacing: 8px; font-weight: 900; }
        #status { text-align: center; font-size: 1.2rem; padding-top: 40px; color: #888; text-transform: uppercase; letter-spacing: 4px; }
        
        .controls { display: none; justify-content: center; gap: 20px; padding-bottom: 40px; pointer-events: auto; }
        
        /* Стиль кнопок под ржавый металл */
        button { 
            padding: 15px 35px; font-size: 1rem; font-family: inherit; 
            background: linear-gradient(145deg, #222, #111); color: #999; 
            border: 1px solid #444; cursor: pointer; text-transform: uppercase; 
            box-shadow: 4px 4px 10px #000; transition: 0.2s;
        }
        button:active { transform: translateY(2px); box-shadow: 2px 2px 5px #000; color: #ff0000; border-color: #800; }
        
        .top-btn { padding: 10px; font-size: 1.2rem; background: rgba(20,20,20,0.8); border: 1px solid #333; color: #666; cursor: pointer; pointer-events: auto; }
        .btn-group { position: fixed; top: 15px; right: 15px; z-index: 30; display: flex; gap: 8px; }
        
        #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; pointer-events: none; display: none; background: radial-gradient(circle, transparent, #500); }
    </style>
</head>
<body>

    <div id="menu">
        <h1>STAKES</h1>
        <button id="start-btn">ВЗЯТЬ ПАРИ</button>
    </div>

    <div id="game-over">
        <h1 id="go-title">КОНЕЦ</h1>
        <button onclick="location.reload()">ЕЩЕ РАЗ</button>
    </div>

    <div id="damage-overlay"></div>

    <div id="ui-layer">
        <div id="status">...</div>
        <div class="controls" id="controls">
            <button id="take-btn" style="display:none;">ВЗЯТЬ ОРУЖИЕ</button>
            <button id="spin-btn">КРУТИТЬ</button>
            <button id="shoot-btn">ВЫСТРЕЛ</button>
        </div>
    </div>

    <div class="btn-group">
        <button id="mute-btn" class="top-btn">🔊</button>
        <button id="fs-btn" class="top-btn">⛶</button>
    </div>

    <canvas id="noise"></canvas>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        let scene, camera, renderer, gunGroup, cylinderMesh, enemyGroup, enemyArm, enemyHead;
        let mainLight, ambientLight, spotLight;
        let audioCtx, droneGain;
        let bulletPos = 0, currentChamber = 0, state = 'MENU';
        let gunTargetPos = new THREE.Vector3(), gunTargetRot = new THREE.Euler();
        let enemyArmTargetRotX = 0;

        // ---------- ГЕНЕРАЦИЯ ГРЯЗНОЙ ТЕКСТУРЫ ----------
        function createGrungeTexture(color1, color2) {
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = color1;
            ctx.fillRect(0, 0, 512, 512);
            for(let i=0; i<5000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? color2 : 'rgba(0,0,0,0.3)';
                ctx.fillRect(Math.random()*512, Math.random()*512, Math.random()*4, Math.random()*4);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        // ---------- ЗВУК ----------
        const Sound = {
            init() {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                droneGain = audioCtx.createGain();
                const osc = audioCtx.createOscillator();
                osc.type = 'brown'; 
                droneGain.gain.value = 0.02;
                osc.connect(droneGain); droneGain.connect(audioCtx.destination);
                osc.start();
            },
            play(type) {
                if (!audioCtx) return;
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                if (type === 'click') { o.frequency.value = 400; g.gain.value = 0.05; o.start(); o.stop(audioCtx.currentTime + 0.05); }
                if (type === 'shot') { o.type='square'; o.frequency.value = 60; g.gain.value = 0.4; g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8); o.start(); o.stop(audioCtx.currentTime + 0.8); }
                if (type === 'spin') { for(let i=0; i<12; i++) setTimeout(()=>this.play('click'), i*60); }
            }
        };

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050505, 0.15);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 2.5);

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.setClearColor(0x000000);
            document.body.appendChild(renderer.domElement);

            const wallTex = createGrungeTexture('#151515', '#222');
            const tableTex = createGrungeTexture('#1a100a', '#2a1a10');

            // СВЕТ (как на фото)
            ambientLight = new THREE.AmbientLight(0xff0000, 0.05); // Кровавый оттенок теней
            scene.add(ambientLight);

            mainLight = new THREE.PointLight(0xffeebb, 0.8, 8); // Тусклая лампа
            mainLight.position.set(0, 2.7, 0.5);
            mainLight.castShadow = true;
            scene.add(mainLight);

            // КОРПУС ЛАМПЫ
            const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshBasicMaterial({color: 0xffffff}));
            lamp.position.copy(mainLight.position);
            scene.add(lamp);

            // КОМНАТА
            const roomMat = new THREE.MeshStandardMaterial({ map: wallTex, roughness: 0.8 });
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), roomMat);
            floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);

            const backWall = new THREE.Mesh(new THREE.PlaneGeometry(10, 6), roomMat);
            backWall.position.set(0, 2, -3); backWall.receiveShadow = true; scene.add(backWall);

            // СТОЛ
            const table = new THREE.Mesh(
                new THREE.BoxGeometry(3.5, 0.1, 2.5),
                new THREE.MeshStandardMaterial({ map: tableTex, roughness: 0.6 })
            );
            table.position.set(0, 0.9, 0.8); table.receiveShadow = true; scene.add(table);

            buildDealer();
            buildGun();
            animate();
            initNoiseFX();
        }

        function buildDealer() {
            enemyGroup = new THREE.Group();
            const rustMat = new THREE.MeshStandardMaterial({ color: 0x22110a, roughness: 0.9, metalness: 0.3 });
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });

            // Торс
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1, 0.3), rustMat);
            body.position.y = 1.4; enemyGroup.add(body);

            // Голова (более сложная)
            enemyHead = new THREE.Group();
            const cran = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.4, 0.3), rustMat);
            enemyHead.add(cran);
            
            // Глаза
            const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.04), eyeMat);
            eyeL.position.set(-0.08, 0.1, 0.15); enemyHead.add(eyeL);
            const eyeR = eyeL.clone(); eyeR.position.x = 0.08; enemyHead.add(eyeR);
            
            // Свет от глаз (слабое свечение на стол)
            const eyeLight = new THREE.PointLight(0xff0000, 0.5, 2);
            eyeLight.position.set(0, 0, 0.2); enemyHead.add(eyeLight);

            enemyHead.position.y = 2.1; enemyGroup.add(enemyHead);

            // Рука
            enemyArm = new THREE.Group();
            enemyArm.position.set(0.4, 1.8, 0.1);
            const armM = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.7, 0.15), rustMat);
            armM.position.y = -0.3; enemyArm.add(armM);
            enemyGroup.add(enemyArm);

            enemyGroup.position.z = -0.5;
            scene.add(enemyGroup);
        }

        function buildGun() {
            gunGroup = new THREE.Group();
            const metal = new THREE.MeshStandardMaterial({ color: 0x111, metalness: 0.9, roughness: 0.2 });
            const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.1, 0.4), metal);
            gunGroup.add(barrel);
            cylinderMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.15, 8), metal);
            cylinderMesh.rotation.x = Math.PI/2; gunGroup.add(cylinderMesh);
            scene.add(gunGroup);
            updatePlacement('TABLE_ENEMY');
        }

        function updatePlacement(type) {
            scene.updateMatrixWorld(true);
            if (type === 'TABLE_ENEMY') { attach(scene, gunGroup); gunTargetPos.set(0, 1, 0.5); gunTargetRot.set(0, 1.5, 0); }
            if (type === 'ENEMY_HAND') { attach(enemyArm, gunGroup); gunTargetPos.set(0, -0.7, 0.1); gunTargetRot.set(1.5, 0, 0); }
            if (type === 'PLAYER_HAND') { attach(camera, gunGroup); gunTargetPos.set(0.4, -0.4, -0.7); gunTargetRot.set(0, 0, 0); }
            if (type === 'PLAYER_AIM') { attach(camera, gunGroup); gunTargetPos.set(0, -0.1, -0.4); gunTargetRot.set(0, 0, 0); }
        }

        function attach(parent, child) {
            const pos = new THREE.Vector3(); const quat = new THREE.Quaternion();
            child.getWorldPosition(pos); child.getWorldQuaternion(quat);
            parent.add(child);
            child.position.copy(parent.worldToLocal(pos));
            child.quaternion.copy(quat);
        }

        function enemyTurn() {
            state = 'ENEMY';
            document.getElementById('status').innerText = "ОЧЕРЕДЬ ДИЛЕРА";
            updatePlacement('ENEMY_HAND');
            enemyArmTargetRotX = 0;
            
            setTimeout(() => {
                Sound.play('spin');
                let s = 0; const i = setInterval(() => { cylinderMesh.rotation.z += 1; if(s++>12) clearInterval(i); }, 60);
                setTimeout(() => {
                    enemyArmTargetRotX = -Math.PI * 0.7; // Поднимает вверх
                    setTimeout(() => {
                        if (currentChamber === bulletPos) { Sound.play('shot'); location.reload(); }
                        else { 
                            Sound.play('click'); currentChamber = (currentChamber + 1) % 6; 
                            enemyArmTargetRotX = 0; setTimeout(playerTurn, 1000); 
                        }
                    }, 1000);
                }, 1000);
            }, 1000);
        }

        function playerTurn() {
            state = 'PLAYER';
            updatePlacement('TABLE_ENEMY');
            document.getElementById('status').innerText = "ТВОЙ ХОД";
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('take-btn').style.display = 'block';
            document.getElementById('spin-btn').style.display = 'none';
            document.getElementById('shoot-btn').style.display = 'none';
        }

        document.getElementById('take-btn').onclick = () => {
            updatePlacement('PLAYER_HAND');
            document.getElementById('take-btn').style.display = 'none';
            document.getElementById('spin-btn').style.display = 'block';
            document.getElementById('shoot-btn').style.display = 'block';
        };

        document.getElementById('spin-btn').onclick = () => {
            Sound.play('spin'); gunGroup.visible = false;
            setTimeout(() => { bulletPos = Math.floor(Math.random()*6); currentChamber = 0; gunGroup.visible = true; }, 1000);
        };

        document.getElementById('shoot-btn').onclick = () => {
            updatePlacement('PLAYER_AIM');
            document.getElementById('controls').style.display = 'none';
            setTimeout(() => {
                if (currentChamber === bulletPos) { Sound.play('shot'); document.getElementById('damage-overlay').style.display='block'; setTimeout(()=>location.reload(), 2000); }
                else { Sound.play('click'); currentChamber = (currentChamber + 1) % 6; enemyTurn(); }
            }, 800);
        };

        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now() * 0.001;
            
            // Мерцание лампы
            mainLight.intensity = 0.7 + Math.random() * 0.3;
            
            // Движение руки
            enemyArm.rotation.x += (enemyArmTargetRotX - enemyArm.rotation.x) * 0.1;
            
            // Слежение головой
            enemyHead.lookAt(camera.position.x, 1.6, camera.position.z);

            gunGroup.position.lerp(gunTargetPos, 0.1);
            gunGroup.quaternion.slerp(new THREE.Quaternion().setFromEuler(gunTargetRot), 0.1);
            
            renderer.render(scene, camera);
            updateNoiseFX();
        }

        // ШУМ VHS
        const nC = document.getElementById('noise'); const nX = nC.getContext('2d');
        function initNoiseFX() { nC.width = 256; nC.height = 256; }
        function updateNoiseFX() {
            const id = nX.createImageData(256, 256); const d = new Uint32Array(id.data.buffer);
            for(let i=0; i<d.length; i++) if(Math.random()>0.9) d[i] = 0xff000000;
            nX.putImageData(id, 0, 0);
        }

        document.getElementById('start-btn').onclick = () => { Sound.init(); startGame(); };
        function startGame() { document.getElementById('menu').style.display='none'; bulletPos=Math.floor(Math.random()*6); enemyTurn(); }
        
        init();
    </script>
</body>
</html>
