<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STAKES: Definitive Edition</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; color: white; user-select: none; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Интерфейс */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        #menu, #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a1a, #000); z-index: 20; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; text-align: center; }
        
        h1 { font-size: 4rem; color: #ff0000; text-shadow: 0 0 20px #f00; margin: 10px; letter-spacing: 5px; }
        p { color: #888; margin-bottom: 30px; }

        .controls { display: none; justify-content: center; gap: 20px; padding-bottom: 50px; pointer-events: auto; }
        button { padding: 15px 35px; font-size: 1.2rem; font-family: inherit; background: #111; color: #fff; border: 2px solid #444; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #ff0000; color: #000; border-color: #fff; }
        button:disabled { opacity: 0.2; cursor: default; }

        #status { text-align: center; font-size: 1.8rem; padding-top: 40px; text-shadow: 2px 2px 5px #000; height: 60px; }

        /* Эффекты проигрыша */
        #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; pointer-events: none; display: none; overflow: hidden; }
        .blood { position: absolute; background: #700; border-radius: 50%; filter: blur(10px); opacity: 0.8; }
        .crack { position: absolute; background: rgba(255,255,255,0.4); box-shadow: 0 0 10px rgba(255,255,255,0.5); }

        #orientation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: none; justify-content: center; align-items: center; text-align: center; }
        @media (orientation: portrait) { #orientation { display: flex; } }
    </style>
</head>
<body>

    <div id="orientation"><h2>ПЕРЕВЕРНИТЕ УСТРОЙСТВО</h2></div>

    <div id="menu">
        <h1>STAKES</h1>
        <p>КРУТИ. ПЕРЕДАВАЙ. ВЫЖИВАЙ.</p>
        <button id="start-btn">ПРИНЯТЬ ПАРИ</button>
    </div>

    <div id="game-over">
        <h1 id="go-title">КОНЕЦ</h1>
        <button onclick="location.reload()">ИГРАТЬ СНОВА</button>
    </div>

    <div id="damage-overlay"></div>

    <div id="ui-layer">
        <div id="status">ОЖИДАНИЕ...</div>
        <div class="controls" id="controls">
            <button id="take-btn" style="display:none;">ВЗЯТЬ ПИСТОЛЕТ</button>
            <button id="spin-btn">КРУТИТЬ</button>
            <button id="shoot-btn">ВЫСТРЕЛ</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        let scene, camera, renderer, gunGroup, cylinderMesh, enemyGroup, enemyArm, enemyJaw, eyeLight;
        let clockTex, clockCtx, cloudGroup, table;
        let audioCtx, droneOsc;
        let bulletPos = -1, currentChamber = 0, state = 'MENU';
        let gunTargetPos = new THREE.Vector3(), gunTargetRot = new THREE.Euler();

        const uiStatus = document.getElementById('status');
        const ctrl = document.getElementById('controls');
        const takeBtn = document.getElementById('take-btn');
        const spinBtn = document.getElementById('spin-btn');
        const shootBtn = document.getElementById('shoot-btn');

        // --- ЗВУКОВАЯ СИСТЕМА ---
        const Sound = {
            init() {
                if(audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                this.startMusic();
            },
            startMusic() {
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();
                const osc = audioCtx.createOscillator();
                osc.type = 'sawtooth'; osc.frequency.value = 45;
                filter.type = 'lowpass'; filter.frequency.value = 150;
                gain.gain.value = 0.05;
                osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
                osc.start();
                setInterval(() => { gain.gain.setTargetAtTime(0.03 + Math.random()*0.04, audioCtx.currentTime, 1); }, 2000);
            },
            play(type) {
                if(!audioCtx) return;
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                if(type==='click') {
                    o.frequency.setValueAtTime(900, audioCtx.currentTime);
                    o.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
                    g.gain.value = 0.2; o.start(); o.stop(audioCtx.currentTime + 0.1);
                } else if(type==='shot') {
                    o.type = 'square'; o.frequency.value = 50; g.gain.value = 1;
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
                    o.start(); o.stop(audioCtx.currentTime + 1);
                } else if(type==='spin') {
                    for(let i=0; i<12; i++) setTimeout(() => this.play('click'), i*70);
                }
            }
        };

        // --- ИНИЦИАЛИЗАЦИЯ 3D ---
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x050508, 2, 12);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 2.5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            renderer.domElement.id = 'game-canvas';

            const amb = new THREE.AmbientLight(0x222244, 0.3); scene.add(amb);
            const spot = new THREE.PointLight(0xffccaa, 1.2, 10);
            spot.position.set(0, 3, 1); spot.castShadow = true; scene.add(spot);

            buildRoom();
            buildEnemy();
            buildGun();
            animate();
        }

        function buildRoom() {
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 1 });
            const room = new THREE.Mesh(new THREE.BoxGeometry(8, 6, 8), wallMat);
            room.position.y = 3; room.material.side = THREE.BackSide;
            room.receiveShadow = true; scene.add(room);

            // Стол
            table = new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 2), new THREE.MeshStandardMaterial({color: 0x150d08}));
            table.position.set(0, 0.9, 0.5); table.receiveShadow = true; scene.add(table);

            // Окно и декорации
            const win = new THREE.Mesh(new THREE.PlaneGeometry(2, 1.5), new THREE.MeshBasicMaterial({color: 0x050510}));
            win.position.set(0, 2.5, -3.95); scene.add(win);
            
            const moon = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({color: 0xffffdd}));
            moon.position.set(0.5, 2.8, -5); scene.add(moon);

            // Часы
            const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 64;
            clockCtx = canvas.getContext('2d');
            clockTex = new THREE.CanvasTexture(canvas);
            const clock = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.4), new THREE.MeshBasicMaterial({map: clockTex}));
            clock.position.set(-2, 3, -3.9); scene.add(clock);
        }

        function buildEnemy() {
            enemyGroup = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({color: 0x080808});

            // Туловище и одежда
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.5), mat);
            body.position.y = 1.5; enemyGroup.add(body);
            
            const shirt = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 0.6), new THREE.MeshBasicMaterial({color: 0xdddddd}));
            shirt.position.set(0, 1.8, 0.26); enemyGroup.add(shirt);

            // Голова
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), mat);
            head.position.y = 2.5; enemyGroup.add(head);

            // Челюсть (анимированная)
            enemyJaw = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.15, 0.5), mat);
            enemyJaw.position.set(0, 2.25, 0); enemyGroup.add(enemyJaw);

            // Глаза и Шляпа
            const eye = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.1), new THREE.MeshBasicMaterial({color: 0xff0000}));
            eye.rotation.x = Math.PI/2; eye.position.set(0.12, 2.55, 0.25); enemyGroup.add(eye);
            eyeLight = new THREE.PointLight(0xff0000, 0.4, 2); eyeLight.position.copy(eye.position); enemyGroup.add(eyeLight);

            const hat = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.4), mat);
            hat.position.y = 2.9; enemyGroup.add(hat);

            // Рука и пальцы
            enemyArm = new THREE.Group();
            enemyArm.position.set(0.5, 2.0, 0.1);
            const armM = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.8, 0.15), mat);
            armM.position.y = -0.4; enemyArm.add(armM);
            
            const finger = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.2, 0.05), mat);
            finger.position.y = -0.9; enemyArm.add(finger);
            
            enemyGroup.add(enemyArm);
            enemyGroup.position.z = -1.2;
            scene.add(enemyGroup);
        }

        function buildGun() {
            gunGroup = new THREE.Group();
            const mMat = new THREE.MeshStandardMaterial({color: 0x222222, metalness: 1, roughness: 0.2});
            const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.4), mMat);
            barrel.position.z = 0.2; gunGroup.add(barrel);
            
            cylinderMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.15, 12), mMat);
            cylinderMesh.rotation.x = Math.PI/2; gunGroup.add(cylinderMesh);
            
            const grip = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.2, 0.08), new THREE.MeshStandardMaterial({color: 0x2a1a0a}));
            grip.position.set(0, -0.15, -0.1); grip.rotation.x = 0.2; gunGroup.add(grip);

            scene.add(gunGroup);
            updateGunPlacement('TABLE_ENEMY');
        }

        function updateGunPlacement(type) {
            switch(type) {
                case 'TABLE_ENEMY':
                    scene.attach(gunGroup);
                    gunTargetPos.set(0, 1, -0.2); gunTargetRot.set(0, Math.PI/2, 0);
                    break;
                case 'TABLE_PLAYER':
                    scene.attach(gunGroup);
                    gunTargetPos.set(0, 1, 1.2); gunTargetRot.set(0, -Math.PI/2, 0);
                    break;
                case 'PLAYER_HAND':
                    camera.attach(gunGroup);
                    gunTargetPos.set(0.3, -0.3, -0.6); gunTargetRot.set(0, Math.PI, 0);
                    break;
                case 'PLAYER_AIM':
                    camera.attach(gunGroup);
                    gunTargetPos.set(0, -0.1, -0.4); gunTargetRot.set(0, 0, 0);
                    break;
                case 'ENEMY_HAND':
                    enemyArm.attach(gunGroup);
                    gunTargetPos.set(0, -0.9, 0); gunTargetRot.set(Math.PI/2, 0, 0);
                    break;
            }
        }

        // --- ЛОГИКА ИГРЫ ---
        function startGame() {
            Sound.init();
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('damage-overlay').style.display = 'none';
            document.getElementById('damage-overlay').innerHTML = '';
            
            currentChamber = 0;
            bulletPos = Math.floor(Math.random() * 5) + 1; // Защита: не в первой каморе
            enemyTurn();
        }

        function enemyTurn() {
            state = 'ENEMY';
            uiStatus.innerText = "ДИЛЕР ЗАБИРАЕТ ОРУЖИЕ...";
            updateGunPlacement('ENEMY_HAND');
            
            setTimeout(() => {
                uiStatus.innerText = "ДИЛЕР ЦЕЛИТСЯ...";
                enemyArm.rotation.x = -Math.PI * 0.6;
                
                setTimeout(() => {
                    if(currentChamber === bulletPos) {
                        Sound.play('shot');
                        uiStatus.innerText = "ДИЛЕР ПРОИГРАЛ";
                        enemyJaw.position.y = 2.1; // "Рот открылся"
                        finishGame(true);
                    } else {
                        Sound.play('click');
                        uiStatus.innerText = "ОСЕЧКА";
                        currentChamber++;
                        setTimeout(handoverToPlayer, 1000);
                    }
                }, 1000);
            }, 1000);
        }

        function handoverToPlayer() {
            enemyArm.rotation.x = 0;
            updateGunPlacement('TABLE_ENEMY');
            setTimeout(() => {
                uiStatus.innerText = "ВАШ ЧЕРЕД. ВОЗЬМИТЕ ОРУЖИЕ.";
                updateGunPlacement('TABLE_PLAYER');
                ctrl.style.display = 'flex';
                takeBtn.style.display = 'block';
                spinBtn.style.display = 'none';
                shootBtn.style.display = 'none';
            }, 800);
        }

        takeBtn.onclick = () => {
            Sound.play('click');
            updateGunPlacement('PLAYER_HAND');
            takeBtn.style.display = 'none';
            spinBtn.style.display = 'block';
            shootBtn.style.display = 'block';
            state = 'PLAYER_READY';
            uiStatus.innerText = "ВАШ ВЫБОР";
        };

        spinBtn.onclick = () => {
            Sound.play('spin');
            spinBtn.disabled = true; shootBtn.disabled = true;
            let spins = 0;
            const int = setInterval(() => {
                cylinderMesh.rotation.y += 0.6;
                spins++;
                if(spins > 20) {
                    clearInterval(int);
                    bulletPos = Math.floor(Math.random()*6);
                    currentChamber = 0;
                    spinBtn.disabled = false; shootBtn.disabled = false;
                    uiStatus.innerText = "БАРАБАН ПРОКРУЧЕН";
                }
            }, 60);
        };

        shootBtn.onclick = () => {
            state = 'PLAYER_AIMING';
            updateGunPlacement('PLAYER_AIM');
            ctrl.style.display = 'none';
            
            setTimeout(() => {
                if(currentChamber === bulletPos) {
                    Sound.play('shot');
                    showDeathFX();
                    finishGame(false);
                } else {
                    Sound.play('click');
                    currentChamber++;
                    uiStatus.innerText = "ВЫЖИЛ";
                    setTimeout(enemyTurn, 1000);
                }
            }, 800);
        };

        function showDeathFX() {
            const overlay = document.getElementById('damage-overlay');
            overlay.style.display = 'block';
            for(let i=0; i<15; i++) {
                const b = document.createElement('div');
                b.className = 'blood';
                b.style.width = b.style.height = (50+Math.random()*150)+'px';
                b.style.left = Math.random()*100+'%'; b.style.top = Math.random()*100+'%';
                overlay.appendChild(b);
            }
        }

        function finishGame(win) {
            state = 'END';
            setTimeout(() => {
                document.getElementById('game-over').style.display = 'flex';
                document.getElementById('go-title').innerText = win ? "ВЫ ПОБЕДИЛИ" : "ВЫ МЕРТВЫ";
                document.getElementById('go-title').style.color = win ? "#0f0" : "#f00";
            }, 1500);
        }

        // --- ЦИКЛ ОБНОВЛЕНИЯ ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Плавное движение пистолета
            gunGroup.position.lerp(gunTargetPos, 0.1);
            gunGroup.quaternion.slerp(new THREE.Quaternion().setFromEuler(gunTargetRot), 0.1);

            // Часы
            const time = new Date();
            clockCtx.fillStyle = '#000'; clockCtx.fillRect(0,0,128,64);
            clockCtx.fillStyle = '#f00'; clockCtx.font = '24px monospace';
            clockCtx.fillText(time.toLocaleTimeString(), 5, 40);
            clockTex.needsUpdate = true;

            // Анимация челюсти при "говорении"
            if(state === 'ENEMY') {
                enemyJaw.position.y = 2.25 + Math.sin(Date.now()*0.01)*0.02;
            }

            // Тряска от страха
            if(state === 'PLAYER_AIMING') {
                camera.position.x = Math.random()*0.02;
                camera.position.y = 1.6 + Math.random()*0.02;
            } else {
                camera.position.set(0, 1.6, 2.5);
            }

            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').onclick = startGame;
        init();
    </script>
</body>
</html>
