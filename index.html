<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STAKES: Refined</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; color: white; user-select: none; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        #menu, #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a1a, #000); z-index: 20; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; }
        h1 { font-size: clamp(2rem, 8vw, 4rem); color: #f00; text-shadow: 0 0 20px #f00; margin: 0; }
        .controls { display: none; justify-content: center; gap: 20px; padding-bottom: 50px; pointer-events: auto; }
        button { padding: 15px 30px; font-size: 1.1rem; font-family: inherit; background: #111; color: #fff; border: 2px solid #444; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #f00; border-color: #fff; color: #000; }
        #status { text-align: center; font-size: 1.4rem; padding-top: 30px; height: 50px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; pointer-events: none; display: none; }
        .blood { position: absolute; background: #800; border-radius: 50%; filter: blur(10px); opacity: 0.7; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>STAKES</h1>
        <p style="color: #666;">AI Collaboration Project</p>
        <button id="start-btn">ИГРАТЬ</button>
    </div>

    <div id="game-over">
        <h1 id="go-title">КОНЕЦ</h1>
        <button id="restart-btn">ЕЩЕ РАЗ</button>
    </div>

    <div id="damage-overlay"></div>

    <div id="ui-layer">
        <div id="status"></div>
        <div class="controls" id="controls">
            <button id="take-btn" style="display:none;">ВЗЯТЬ</button>
            <button id="spin-btn">КРУТИТЬ</button>
            <button id="shoot-btn">ВЫСТРЕЛ</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        let scene, camera, renderer, gunGroup, cylinderMesh, enemyGroup, enemyArm, mainLight;
        let audioCtx, droneOsc;
        let bulletPos = -1, currentChamber = 0, state = 'MENU';
        let gunTargetPos = new THREE.Vector3(), gunTargetRot = new THREE.Euler();
        let shakeOffset = new THREE.Vector3();

        const uiStatus = document.getElementById('status');
        const ctrl = document.getElementById('controls');
        const takeBtn = document.getElementById('take-btn');
        const spinBtn = document.getElementById('spin-btn');
        const shootBtn = document.getElementById('shoot-btn');

        // --- ЗВУК (исправленный) ---
        const Sound = {
            init() {
                if(audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                this.startMusic();
            },
            startMusic() {
                droneOsc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                droneOsc.type = 'sawtooth'; droneOsc.frequency.value = 40;
                gain.gain.value = 0.04;
                droneOsc.connect(gain); gain.connect(audioCtx.destination);
                droneOsc.start();
            },
            play(type) {
                if(!audioCtx) return;
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                if(type==='click') {
                    o.frequency.setValueAtTime(800, audioCtx.currentTime);
                    g.gain.value = 0.1; o.start(); o.stop(audioCtx.currentTime + 0.05);
                } else if(type==='shot') {
                    o.type = 'square'; o.frequency.value = 60;
                    g.gain.setValueAtTime(1, audioCtx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
                    o.start(); o.stop(audioCtx.currentTime + 1);
                } else if(type==='spin') {
                    for(let i=0; i<15; i++) setTimeout(() => this.play('click'), i*60);
                }
            }
        };

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x050508, 1, 10);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 2.5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            mainLight = new THREE.PointLight(0xffccaa, 1.2, 10);
            mainLight.position.set(0, 3, 1); scene.add(mainLight);

            buildScene();
            buildEnemy();
            buildGun();
            
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function buildScene() {
            const table = new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 2), new THREE.MeshStandardMaterial({color: 0x150d08}));
            table.position.set(0, 0.9, 0.5); scene.add(table);
            const wall = new THREE.Mesh(new THREE.BoxGeometry(10, 6, 1), new THREE.MeshStandardMaterial({color: 0x0a0a0a}));
            wall.position.z = -2; scene.add(wall);
        }

        function buildEnemy() {
            enemyGroup = new THREE.Group();
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0x050505}));
            head.position.y = 2.5; enemyGroup.add(head);
            enemyArm = new THREE.Group(); enemyArm.position.set(0.6, 2.2, 0);
            const arm = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.8, 0.15), new THREE.MeshStandardMaterial({color: 0x050505}));
            arm.position.y = -0.4; enemyArm.add(arm);
            enemyGroup.add(enemyArm); enemyGroup.position.z = -1; scene.add(enemyGroup);
        }

        function buildGun() {
            gunGroup = new THREE.Group();
            const gMat = new THREE.MeshStandardMaterial({color: 0x111111, metalness: 1});
            const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.4), gMat);
            barrel.position.z = 0.2; gunGroup.add(barrel);
            cylinderMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.15, 12), gMat);
            cylinderMesh.rotation.x = Math.PI/2; gunGroup.add(cylinderMesh);
            scene.add(gunGroup);
            updateGun('TABLE_ENEMY');
        }

        function updateGun(mode) {
            if(mode === 'TABLE_ENEMY') { scene.attach(gunGroup); gunTargetPos.set(0, 1, -0.2); gunTargetRot.set(0, Math.PI/2, 0); }
            if(mode === 'TABLE_PLAYER') { scene.attach(gunGroup); gunTargetPos.set(0, 1, 1.2); gunTargetRot.set(0, -Math.PI/2, 0); }
            if(mode === 'PLAYER_HAND') { camera.attach(gunGroup); gunTargetPos.set(0.3, -0.3, -0.6); gunTargetRot.set(0, Math.PI, 0); }
            if(mode === 'PLAYER_AIM') { camera.attach(gunGroup); gunTargetPos.set(0, -0.1, -0.4); gunTargetRot.set(0, 0, 0); }
            if(mode === 'ENEMY_HAND') { enemyArm.attach(gunGroup); gunTargetPos.set(0, -0.9, 0); gunTargetRot.set(Math.PI/2, 0, 0); }
        }

        function createFlash() {
            // Вспышка теперь привязана к позиции дула
            const flash = new THREE.PointLight(0xffaa55, 4, 5);
            const muzzlePos = new THREE.Vector3(0, 0, 0.4);
            gunGroup.localToWorld(muzzlePos);
            flash.position.copy(muzzlePos);
            scene.add(flash);
            setTimeout(() => scene.remove(flash), 60);
        }

        function startGame() {
            Sound.init();
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('damage-overlay').style.display = 'none';
            currentChamber = 0;
            bulletPos = Math.floor(Math.random() * 6); // 0-5
            enemyTurn();
        }

        function enemyTurn() {
            state = 'ENEMY'; uiStatus.innerText = "ДИЛЕР ХОДИТ...";
            updateGun('ENEMY_HAND');
            setTimeout(() => {
                enemyArm.rotation.x = -1.6;
                setTimeout(() => {
                    if(currentChamber === bulletPos) { Sound.play('shot'); createFlash(); finishGame(true); }
                    else { Sound.play('click'); currentChamber++; handover(); }
                }, 1000);
            }, 1000);
        }

        function handover() {
            enemyArm.rotation.x = 0; updateGun('TABLE_ENEMY');
            setTimeout(() => {
                updateGun('TABLE_PLAYER'); uiStatus.innerText = "ТВОЙ ЧЕРЕД";
                ctrl.style.display = 'flex'; takeBtn.style.display = 'block';
                spinBtn.style.display = 'none'; shootBtn.style.display = 'none';
            }, 800);
        }

        takeBtn.onclick = () => {
            Sound.play('click'); updateGun('PLAYER_HAND');
            takeBtn.style.display='none'; spinBtn.style.display='block'; shootBtn.style.display='block';
            state = 'READY';
        };

        spinBtn.onclick = () => {
            Sound.play('spin'); spinBtn.disabled = true;
            let spins = 0;
            const int = setInterval(() => {
                cylinderMesh.rotation.y += 0.5; spins++;
                if(spins > 20) {
                    clearInterval(int); bulletPos = Math.floor(Math.random()*6);
                    currentChamber = 0; spinBtn.disabled = false;
                }
            }, 50);
        };

        shootBtn.onclick = () => {
            state = 'AIMING'; updateGun('PLAYER_AIM'); ctrl.style.display = 'none';
            setTimeout(() => {
                if(currentChamber === bulletPos) { Sound.play('shot'); createFlash(); showBlood(); finishGame(false); }
                else { Sound.play('click'); currentChamber++; setTimeout(enemyTurn, 1000); }
            }, 800);
        };

        function showBlood() {
            const overlay = document.getElementById('damage-overlay');
            overlay.style.display = 'block'; overlay.innerHTML = '';
            for(let i=0; i<15; i++) {
                const b = document.createElement('div'); b.className = 'blood';
                b.style.width = b.style.height = (80+Math.random()*100)+'px';
                b.style.left = Math.random()*100+'%'; b.style.top = Math.random()*100+'%';
                overlay.appendChild(b);
            }
        }

        function finishGame(win) {
            state = 'END';
            setTimeout(() => {
                document.getElementById('game-over').style.display = 'flex';
                document.getElementById('go-title').innerText = win ? "ДИЛЕР УБИТ" : "ТЫ УБИТ";
                document.getElementById('go-title').style.color = win ? "#0f0" : "#f00";
            }, 1000);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.002;

            // Плавное мерцание (lerp-style)
            mainLight.intensity = THREE.MathUtils.lerp(mainLight.intensity, 1 + Math.sin(time*10)*0.2, 0.1);

            // Тряска при прицеливании (более плавная)
            if(state === 'AIMING') {
                shakeOffset.set((Math.random()-0.5)*0.03, (Math.random()-0.5)*0.03, 0);
                camera.position.add(shakeOffset);
            } else {
                camera.position.lerp(new THREE.Vector3(0, 1.6, 2.5), 0.1);
            }

            gunGroup.position.lerp(gunTargetPos, 0.1);
            gunGroup.quaternion.slerp(new THREE.Quaternion().setFromEuler(gunTargetRot), 0.1);

            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('restart-btn').onclick = () => location.reload();
        init();
    </script>
</body>
</html>
