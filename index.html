<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Russian Roulette 3D</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: sans-serif; color: white;
        }

        /* Интерфейс поверх 3D */
        #ui-layer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: space-between;
            align-items: center;
            pointer-events: none; /* Чтобы можно было крутить камеру, если нужно */
            padding: 20px; box-sizing: border-box;
        }

        .btn-container {
            display: flex; gap: 20px; pointer-events: auto;
            margin-bottom: 30px;
        }

        button {
            padding: 15px 40px; font-size: 1.2rem; font-weight: bold;
            border: none; border-radius: 8px; cursor: pointer;
            text-transform: uppercase; transition: 0.2s;
        }

        #spin-btn { background: #d4af37; color: #000; }
        #fire-btn { background: #e74c3c; color: #fff; }
        button:disabled { opacity: 0.3; }

        #status {
            font-size: 2rem; text-align: center;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            margin-top: 20px;
        }

        #orientation-overlay, #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 100;
            display: flex; justify-content: center; align-items: center;
            text-align: center; flex-direction: column;
        }

        @media (orientation: landscape) { #orientation-overlay { display: none; } }
        @media (orientation: portrait) { #orientation-overlay { display: flex; } }
    </style>
</head>
<body>

    <div id="orientation-overlay">
        <h2>🔄 Переверните телефон в ландшафтный режим</h2>
    </div>

    <div id="start-overlay">
        <button id="start-btn" style="pointer-events: auto;">ЗАПУСТИТЬ 3D ИГРУ</button>
    </div>

    <div id="ui-layer">
        <div id="status">Нажмите «КРУТИТЬ»</div>
        <div class="btn-container">
            <button id="spin-btn">Крутить</button>
            <button id="fire-btn" disabled>Выстрел</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        let scene, camera, renderer, drum, chambers = [];
        let bulletPos = -1;
        let currentPos = 0;
        let isSpinning = false;

        const statusText = document.getElementById('status');
        const spinBtn = document.getElementById('spin-btn');
        const fireBtn = document.getElementById('fire-btn');

        // Инициализация 3D
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 8);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Свет
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0xffffff, 1);
            pointLight.position.set(5, 5, 5);
            scene.add(pointLight);

            // Создание барабана (Группа объектов)
            drum = new THREE.Group();

            // Основной цилиндр барабана
            const drumGeo = new THREE.CylinderGeometry(2, 2, 2.5, 32);
            const drumMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.2 });
            const drumMesh = new THREE.Mesh(drumGeo, drumMat);
            drum.add(drumMesh);

            // Создаем 6 отверстий (камор)
            for (let i = 0; i < 6; i++) {
                const holeGeo = new THREE.CylinderGeometry(0.5, 0.5, 2.6, 16);
                const holeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
                const hole = new THREE.Mesh(holeGeo, holeMat);
                
                const angle = (i / 6) * Math.PI * 2;
                hole.position.x = Math.cos(angle) * 1.2;
                hole.position.z = Math.sin(angle) * 1.2;
                drum.add(hole);
                chambers.push(angle);
            }

            scene.add(drum);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        // Обработка изменения размера окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Логика игры
        document.getElementById('start-btn').onclick = () => {
            document.getElementById('start-overlay').style.display = 'none';
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            init3D();
        };

        spinBtn.onclick = () => {
            if (isSpinning) return;
            isSpinning = true;
            fireBtn.disabled = true;
            statusText.innerText = "Барабан вращается...";

            bulletPos = Math.floor(Math.random() * 6);
            currentPos = 0;

            const rotations = Math.PI * 10 + (bulletPos * (Math.PI * 2 / 6)); 
            const startTime = performance.now();
            const duration = 2000;

            function rotateAnim(time) {
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 3); // Выход из анимации плавнее
                
                drum.rotation.y = ease * rotations;

                if (progress < 1) {
                    requestAnimationFrame(rotateAnim);
                } else {
                    isSpinning = false;
                    fireBtn.disabled = false;
                    statusText.innerText = "Твой ход...";
                    // Сбросим угол для логики выстрелов
                    drum.rotation.y = drum.rotation.y % (Math.PI * 2);
                }
            }
            requestAnimationFrame(rotateAnim);
        };

        fireBtn.onclick = () => {
            if (currentPos === bulletPos) {
                statusText.innerText = "💥 БАБАХ!";
                statusText.style.color = "#ff4444";
                fireBtn.disabled = true;
                if(navigator.vibrate) navigator.vibrate(500);
            } else {
                statusText.innerText = "*Клик*";
                currentPos++;
                // Немного поворачиваем барабан к следующей каморе
                drum.rotation.y += (Math.PI * 2 / 6);
                if(navigator.vibrate) navigator.vibrate(50);
            }
        };

    </script>
</body>
</html>
