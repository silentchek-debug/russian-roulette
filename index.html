<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STAKES: Nightmare Edition</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; color: white; user-select: none; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        #menu, #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a1a, #000); z-index: 20; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; text-align: center; }
        #game-over { display: none; }
        h1 { font-size: clamp(2rem, 10vw, 4rem); color: #ff0000; text-shadow: 0 0 20px #f00; margin: 10px; letter-spacing: 5px; }
        .controls { display: none; justify-content: center; gap: 20px; padding-bottom: 50px; pointer-events: auto; }
        button { padding: 15px 35px; font-size: 1.2rem; font-family: inherit; background: #111; color: #fff; border: 2px solid #444; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #ff0000; color: #000; border-color: #fff; }
        button:disabled { opacity: 0.2; }
        #status { text-align: center; font-size: 1.8rem; padding-top: 40px; text-shadow: 2px 2px 5px #000; height: 60px; text-transform: uppercase; }
        #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; pointer-events: none; display: none; overflow: hidden; }
        .blood { position: absolute; background: #600; border-radius: 50%; filter: blur(8px); opacity: 0.7; }
        .crack { position: absolute; background: rgba(255,255,255,0.5); box-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .top-btn { padding: 10px 15px; font-size: 1.5rem; background: rgba(0,0,0,0.7); border: 1px solid #444; color: #fff; cursor: pointer; pointer-events: auto; }
        .btn-group { position: fixed; top: 20px; right: 20px; z-index: 30; pointer-events: auto; display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>STAKES</h1>
        <p style="color:#666">Low-Poly Nightmare</p>
        <button id="start-btn">ПРИНЯТЬ ПАРИ</button>
    </div>

    <div id="game-over">
        <h1 id="go-title">КОНЕЦ</h1>
        <button onclick="location.reload()">ЗАНОВО</button>
    </div>

    <div id="damage-overlay"></div>

    <div id="ui-layer">
        <div id="status">ОЖИДАНИЕ...</div>
        <div class="controls" id="controls">
            <button id="take-btn" style="display:none;">ВЗЯТЬ ПИСТОЛЕТ</button>
            <button id="spin-btn">КРУТИТЬ</button>
            <button id="shoot-btn">ВЫСТРЕЛ</button>
        </div>
    </div>

    <div class="btn-group">
        <button id="mute-btn" class="top-btn">🔊</button>
        <button id="fs-btn" class="top-btn">⛶</button>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        let scene, camera, renderer, gunGroup, cylinderMesh, enemyGroup, enemyArm, enemyJaw;
        let clockTex, clockCtx, mainLight, ambientLight, lampBulb, shellGroup;
        let audioCtx, droneOsc, droneGain;
        let bulletPos = 0, currentChamber = 0, state = 'MENU';
        let gunTargetPos = new THREE.Vector3(), gunTargetRot = new THREE.Euler();
        let shakeOffset = new THREE.Vector3();

        const Sound = {
            init() {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                this.startBackground();
            },
            startBackground() {
                droneGain = audioCtx.createGain();
                droneOsc = audioCtx.createOscillator();
                droneOsc.type = 'sawtooth';
                droneOsc.frequency.value = 40;
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 200;

                droneGain.gain.value = 0.05;
                droneOsc.connect(filter);
                filter.connect(droneGain);
                droneGain.connect(audioCtx.destination);
                droneOsc.start();
            },
            play(type, p = null) {
                if (!audioCtx) return;
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                if (type === 'click') {
                    o.frequency.value = 600; g.gain.value = 0.1;
                    o.start(); o.stop(audioCtx.currentTime + 0.05);
                } else if (type === 'shot') {
                    o.type = 'square'; o.frequency.value = 50; g.gain.value = 0.8;
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
                    o.start(); o.stop(audioCtx.currentTime + 0.8);
                    
                    mainLight.color.setHex(0xff3300);
                    mainLight.intensity = 4;
                    setTimeout(() => { mainLight.color.setHex(0xffccaa); mainLight.intensity = 1.2; }, 100);
                } else if (type === 'spin') {
                    for (let i = 0; i < 15; i++) setTimeout(() => this.play('click'), i * 60);
                }
            }
        };

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x020205, 3, 15);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 2.5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            renderer.domElement.id = 'game-canvas';

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            ambientLight = new THREE.AmbientLight(0x0a0a15, 0.5); scene.add(ambientLight);
            mainLight = new THREE.PointLight(0xffccaa, 1.2, 12);
            mainLight.position.set(0, 2.8, 0); mainLight.castShadow = true;
            scene.add(mainLight);

            lampBulb = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshBasicMaterial({color:0xfffee0}));
            lampBulb.position.copy(mainLight.position); scene.add(lampBulb);

            buildRoom();
            buildEnemy();
            buildGun();
            animate();
        }

        function buildRoom() {
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, side: THREE.BackSide, roughness: 1 });
            const room = new THREE.Mesh(new THREE.BoxGeometry(8, 5, 8), constMat);
            room.position.y = 2.5; room.receiveShadow = true; scene.add(room);

            const table = new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 2.2), new THREE.MeshStandardMaterial({ color: 0x1a110a, roughness: 0.8 }));
            table.position.set(0, 0.9, 0.5); table.receiveShadow = true; scene.add(table);

            const win = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 1.8), new THREE.MeshBasicMaterial({ color: 0x000008 }));
            win.position.set(0, 2.5, -3.95); scene.add(win);

            for (let i = 0; i < 5; i++) {
                const bHeight = 1 + Math.random() * 2;
                const bld = new THREE.Mesh(new THREE.BoxGeometry(0.4, bHeight, 0.2), new THREE.MeshBasicMaterial({color: 0x010103}));
                bld.position.set(-1 + i*0.5, 1.5 + bHeight/2, -4.2);
                scene.add(bld);
            }

            const moon = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color: 0xaaaa99}));
            moon.position.set(0.8, 3, -4.5); scene.add(moon);

            for (let i = 0; i < 3; i++) {
                const cloud = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.2, 0.1), new THREE.MeshBasicMaterial({color: 0x111122, transparent:true, opacity:0.3}));
                cloud.position.set(-2 + Math.random()*4, 2.5 + Math.random(), -4.1);
                cloud.userData.speed = 0.002 + Math.random()*0.003;
                scene.add(cloud);
            }

            const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 64;
            clockCtx = canvas.getContext('2d');
            clockTex = new THREE.CanvasTexture(canvas);
            const clock = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 0.35), new THREE.MeshBasicMaterial({ map: clockTex }));
            clock.position.set(-2.5, 3, -3.9); scene.add(clock);
        }

        function buildEnemy() {
            enemyGroup = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 1 });
            
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.3, 0.5), mat);
            torso.position.y = 1.55; torso.castShadow = true; enemyGroup.add(torso);
            
            const vest = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 0.7), new THREE.MeshBasicMaterial({color: 0xdddddd}));
            vest.position.set(0, 1.85, 0.26); enemyGroup.add(vest);

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), mat);
            head.position.y = 2.6; enemyGroup.add(head);

            enemyJaw = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.15, 0.5), mat);
            enemyJaw.position.set(0, 2.35, 0); enemyGroup.add(enemyJaw);

            const hatGroup = new THREE.Group();
            const brim = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.03, 12), mat);
            const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.4, 12), mat);
            crown.position.y = 0.2; hatGroup.add(brim); hatGroup.add(crown);
            hatGroup.position.y = 2.85; hatGroup.rotation.x = -0.1; enemyGroup.add(hatGroup);

            const eyeGeo = new THREE.SphereGeometry(0.02, 4, 4);
            const eyeMat = new THREE.MeshBasicMaterial({color: 0xff0000});
            const eL = new THREE.Mesh(eyeGeo, eyeMat); eL.position.set(-0.15, 2.65, 0.26); enemyGroup.add(eL);
            const eR = new THREE.Mesh(eyeGeo, eyeMat); eR.position.set(0.15, 2.65, 0.26); enemyGroup.add(eR);

            enemyArm = new THREE.Group();
            enemyArm.position.set(0.6, 2.2, 0.2);
            const armM = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.9, 0.2), mat);
            armM.position.y = -0.4; enemyArm.add(armM);
            
            const f1 = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.2, 0.04), mat); f1.position.set(0.05, -0.9, 0.05); enemyArm.add(f1);
            const f2 = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.2, 0.04), mat); f2.position.set(-0.05, -0.9, 0.05); enemyArm.add(f2);
            
            enemyGroup.add(enemyArm);
            enemyGroup.position.z = -1.5;
            scene.add(enemyGroup);
        }

        function buildGun() {
            gunGroup = new THREE.Group();
            const mMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.9, roughness: 0.1 });
            const wMat = new THREE.MeshStandardMaterial({ color: 0x4a2e19, roughness: 0.9 });

            const frame = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.15, 0.3), mMat); gunGroup.add(frame);
            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.4, 12), mMat);
            barrel.rotation.x = Math.PI/2; barrel.position.z = 0.35; barrel.position.y = 0.04; gunGroup.add(barrel);
            
            const sight = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.03, 0.04), mMat); sight.position.set(0, 0.08, 0.5); gunGroup.add(sight);

            cylinderMesh = new THREE.Group();
            const cylBody = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.18, 12), mMat);
            cylBody.rotation.x = Math.PI/2; cylinderMesh.add(cylBody);
            
            for (let i = 0; i < 6; i++) {
                const chamber = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.2, 8), new THREE.MeshBasicMaterial({color:0x000000}));
                chamber.rotation.x = Math.PI/2;
                const angle = (i/6) * Math.PI*2;
                chamber.position.set(Math.cos(angle)*0.05, Math.sin(angle)*0.05, 0);
                cylinderMesh.add(chamber);
            }
            cylinderMesh.position.z = 0.1; gunGroup.add(cylinderMesh);

            const grip = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.25, 0.12), wMat);
            grip.position.set(0, -0.15, -0.05); grip.rotation.x = 0.3; gunGroup.add(grip);

            scene.add(gunGroup);
            shellGroup = new THREE.Group(); scene.add(shellGroup);
            updateGunPlacement('TABLE_ENEMY');
        }

        function safeAttach(parent, child) {
            if (!child || !parent) return;
            const pos = new THREE.Vector3(); const quat = new THREE.Quaternion(); const scale = new THREE.Vector3();
            child.matrixWorld.decompose(pos, quat, scale);
            parent.add(child);
            child.position.copy(parent.worldToLocal(pos));
            child.quaternion.copy(quat);
        }

        function updateGunPlacement(type) {
            if (type === 'TABLE_ENEMY') { safeAttach(scene, gunGroup); gunTargetPos.set(0, 1, -0.3); gunTargetRot.set(0, Math.PI/2, 0); }
            else if (type === 'TABLE_PLAYER') { safeAttach(scene, gunGroup); gunTargetPos.set(0, 1, 1.3); gunTargetRot.set(0, -Math.PI/2, 0); }
            else if (type === 'PLAYER_HAND') { safeAttach(camera, gunGroup); gunTargetPos.set(0.3, -0.3, -0.6); gunTargetRot.set(0, Math.PI, 0); }
            else if (type === 'PLAYER_AIM') { safeAttach(camera, gunGroup); gunTargetPos.set(0, -0.1, -0.35); gunTargetRot.set(0, 0, 0); }
            else if (type === 'ENEMY_HAND') { safeAttach(enemyArm, gunGroup); gunTargetPos.set(0, -1.05, 0); gunTargetRot.set(Math.PI/2, 0, 0); }
        }

        function spawnShell() {
            const shellGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.06, 8);
            const shellMat = new THREE.MeshStandardMaterial({color: 0xccaa44, metalness: 1, roughness: 0.3});
            const shell = new THREE.Mesh(shellGeo, shellMat);
            
            const muzzle = new THREE.Vector3(0, 0.04, 0.55);
            gunGroup.localToWorld(muzzle);
            shell.position.copy(muzzle);
            
            shell.userData.vel = new THREE.Vector3(0.02 + Math.random()*0.02, 0.05 + Math.random()*0.05, -0.01);
            shell.userData.rotVel = new THREE.Vector3(Math.random(), Math.random(), Math.random()).multiplyScalar(0.2);
            shell.castShadow = true;
            shellGroup.add(shell);
        }

        function startGame() {
            Sound.init();
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('damage-overlay').style.display = 'none';
            document.getElementById('damage-overlay').innerHTML = '';
            
            currentChamber = 0;
            bulletPos = Math.floor(Math.random() * 6);
            enemyTurn();
        }

        function enemyTurn() {
            state = 'ENEMY';
            document.getElementById('status').innerText = "ХОД ДИЛЕРА...";
            updateGunPlacement('ENEMY_HAND');
            
            setTimeout(() => {
                enemyArm.rotation.x = -Math.PI * 0.65;
                
                setTimeout(() => {
                    enemyJaw.position.y = 2.2; setTimeout(()=>enemyJaw.position.y=2.35, 200);

                    if (currentChamber === bulletPos) {
                        Sound.play('shot'); spawnShell();
                        document.getElementById('status').innerText = "ДИЛЕР ПРОИГРАЛ";
                        state = 'END';
                        setTimeout(() => location.reload(), 3000);
                    } else {
                        Sound.play('click');
                        currentChamber++;
                        handover();
                    }
                }, 1000);
            }, 1000);
        }

        function handover() {
            enemyArm.rotation.x = 0;
            updateGunPlacement('TABLE_ENEMY');
            setTimeout(() => {
                updateGunPlacement('TABLE_PLAYER');
                document.getElementById('status').innerText = "ТВОЙ ХОД";
                const ctrl = document.getElementById('controls');
                ctrl.style.display = 'flex';
                document.getElementById('take-btn').style.display = 'block';
                document.getElementById('spin-btn').style.display = 'none';
                document.getElementById('shoot-btn').style.display = 'none';
            }, 1000);
        }

        document.getElementById('take-btn').onclick = () => {
            Sound.play('click');
            updateGunPlacement('PLAYER_HAND');
            document.getElementById('take-btn').style.display = 'none';
            document.getElementById('spin-btn').style.display = 'block';
            document.getElementById('shoot-btn').style.display = 'block';
            state = 'PLAYER_READY';
        };

        document.getElementById('spin-btn').onclick = () => {
            Sound.play('spin');
            document.getElementById('spin-btn').disabled = true;
            let spins = 0;
            const int = setInterval(() => {
                cylinderMesh.rotation.z += 0.8;
                spins++;
                if (spins > 20) {
                    clearInterval(int);
                    bulletPos = Math.floor(Math.random() * 6);
                    currentChamber = 0;
                    document.getElementById('spin-btn').disabled = false;
                    document.getElementById('status').innerText = "БАРАБАН ПРОКРУЧЕН";
                }
            }, 60);
        };

        document.getElementById('shoot-btn').onclick = () => {
            state = 'PLAYER_AIMING';
            updateGunPlacement('PLAYER_AIM');
            document.getElementById('controls').style.display = 'none';
            
            setTimeout(() => {
                if (currentChamber === bulletPos) {
                    Sound.play('shot');
                    spawnShell();
                    showDeathFX();
                    state = 'END';
                    setTimeout(() => document.getElementById('game-over').style.display = 'flex', 2000);
                } else {
                    Sound.play('click');
                    currentChamber++;
                    document.getElementById('status').innerText = "ОСЕЧКА";
                    setTimeout(enemyTurn, 1000);
                }
            }, 800);
        };

        function showDeathFX() {
            const ov = document.getElementById('damage-overlay');
            ov.style.display = 'block';
            for (let i = 0; i < 10; i++) {
                const b = document.createElement('div'); b.className = 'blood';
                b.style.width = b.style.height = (50 + Math.random() * 150) + 'px';
                b.style.left = Math.random() * 100 + '%'; b.style.top = Math.random() * 100 + '%';
                ov.appendChild(b);
            }
            for (let i = 0; i < 3; i++) {
                const c = document.createElement('div'); c.className = 'crack';
                c.style.width = '2px'; c.style.height = '300px';
                c.style.left = '50%'; c.style.top = '50%';
                c.style.transform = `translate(-50%, -50%) rotate(${i*60 + Math.random()*20}deg)`;
                ov.appendChild(c);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            lampBulb.position.x = Math.sin(time * 0.5) * 0.1;
            lampBulb.position.z = Math.cos(time * 0.7) * 0.1;
            mainLight.position.copy(lampBulb.position);
            mainLight.intensity = 1.0 + Math.sin(time * 15) * 0.15 + (Math.random()*0.1);

            scene.children.forEach(c => {
                if (c.userData && c.userData.speed) {
                    c.position.x += c.userData.speed;
                    if (c.position.x > 3) c.position.x = -3;
                }
            });

            shellGroup.children.forEach(s => {
                if (s.position.y > 0.93) {
                    s.userData.vel.y -= 0.005;
                    s.position.add(s.userData.vel);
                    s.rotation.x += s.userData.rotVel.x;
                    s.rotation.y += s.userData.rotVel.y;
                } else if (!s.userData.onTable) {
                    s.userData.onTable = true;
                    s.position.y = 0.93;
                    s.rotation.set(Math.PI/2, Math.random()*Math.PI, 0);
                }
            });

            if (state === 'PLAYER_AIMING') {
                shakeOffset.set((Math.random() - 0.5) * 0.015, (Math.random() - 0.5) * 0.015, 0);
                camera.position.add(shakeOffset);
            } else {
                camera.position.lerp(new THREE.Vector3(0, 1.6, 2.5), 0.1);
            }

            gunGroup.position.lerp(gunTargetPos, 0.1);
            gunGroup.quaternion.slerp(new THREE.Quaternion().setFromEuler(gunTargetRot), 0.1);

            if (clockCtx) {
                clockCtx.fillStyle = '#000'; clockCtx.fillRect(0, 0, 128, 64);
                clockCtx.fillStyle = '#f00'; clockCtx.font = '24px monospace';
                clockCtx.fillText(new Date().toLocaleTimeString(), 10, 40);
                clockTex.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('mute-btn').onclick = () => {
            if (!audioCtx) return;
            if (audioCtx.state === 'running') { audioCtx.suspend(); document.getElementById('mute-btn').innerText = '🔇'; }
            else { audioCtx.resume(); document.getElementById('mute-btn').innerText = '🔊'; }
        };

        const fsBtn = document.getElementById('fs-btn');
        if (fsBtn) {
            fsBtn.onclick = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.error(`Ошибка при переходе в полноэкранный режим: ${err.message}`);
                    });
                } else {
                    document.exitFullscreen();
                }
            };
        }

        init();
    </script>
</body>
</html>
