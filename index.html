<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STAKES: Cinematic & Logic Update</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; color: white; user-select: none; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        #menu, #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a1a, #000); z-index: 20; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; text-align: center; }
        h1 { font-size: 3.5rem; color: #ff0000; text-shadow: 0 0 20px #f00; margin: 10px; }
        .controls { display: none; justify-content: center; gap: 20px; padding-bottom: 50px; pointer-events: auto; }
        button { padding: 15px 35px; font-size: 1.2rem; font-family: inherit; background: #111; color: #fff; border: 2px solid #444; cursor: pointer; text-transform: uppercase; }
        button:hover { background: #f00; color: #000; border-color: #fff; }
        #status { text-align: center; font-size: 1.5rem; padding-top: 40px; height: 60px; text-transform: uppercase; }
        #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; pointer-events: none; display: none; }
        .blood { position: absolute; background: #700; border-radius: 50%; filter: blur(10px); opacity: 0.8; }
        #orientation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: none; justify-content: center; align-items: center; }
        @media (orientation: portrait) { #orientation { display: flex; } }
    </style>
</head>
<body>

    <div id="orientation"><h2>ПЕРЕВЕРНИТЕ ЭКРАН</h2></div>

    <div id="menu">
        <h1>STAKES</h1>
        <button id="start-btn">ПРИНЯТЬ ПАРИ</button>
    </div>

    <div id="game-over">
        <h1 id="go-title">КОНЕЦ</h1>
        <button onclick="location.reload()">ЗАНОВО</button>
    </div>

    <div id="damage-overlay"></div>

    <div id="ui-layer">
        <div id="status"></div>
        <div class="controls" id="controls">
            <button id="take-btn" style="display:none;">ВЗЯТЬ ПИСТОЛЕТ</button>
            <button id="spin-btn">КРУТИТЬ</button>
            <button id="shoot-btn">ВЫСТРЕЛ</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        let scene, camera, renderer, gunGroup, cylinderMesh, enemyGroup, enemyArm, enemyJaw;
        let clockTex, clockCtx, table, mainLight;
        let audioCtx;
        let bulletPos = -1, currentChamber = 0, state = 'MENU';
        let gunTargetPos = new THREE.Vector3(), gunTargetRot = new THREE.Euler();

        const uiStatus = document.getElementById('status');
        const ctrl = document.getElementById('controls');
        const takeBtn = document.getElementById('take-btn');
        const spinBtn = document.getElementById('spin-btn');
        const shootBtn = document.getElementById('shoot-btn');

        const Sound = {
            init() {
                if(audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                this.startMusic();
            },
            startMusic() {
                const g = audioCtx.createGain();
                const o = audioCtx.createOscillator();
                o.type = 'sawtooth'; o.frequency.value = 45;
                g.gain.value = 0.04; o.connect(g); g.connect(audioCtx.destination);
                o.start();
            },
            play(type) {
                if(!audioCtx) return;
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                if(type==='click') {
                    o.frequency.value = 800; g.gain.value = 0.2;
                    o.start(); o.stop(audioCtx.currentTime + 0.1);
                } else if(type==='shot') {
                    o.type = 'square'; o.frequency.value = 60; g.gain.value = 1;
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
                    o.start(); o.stop(audioCtx.currentTime + 1);
                    
                    // 💥 ВСПЫШКА (из кода GPT)
                    const flash = new THREE.PointLight(0xffaa55, 3, 4);
                    flash.position.set(0, 1.6, 1); scene.add(flash);
                    setTimeout(() => scene.remove(flash), 100);
                } else if(type==='spin') {
                    for(let i=0; i<15; i++) setTimeout(() => this.play('click'), i*60);
                }
            }
        };

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x050508, 2, 12);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 2.5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            mainLight = new THREE.PointLight(0xffccaa, 1.2, 10);
            mainLight.position.set(0, 3, 1); mainLight.castShadow = true;
            scene.add(mainLight);

            buildRoom();
            buildEnemy();
            buildGun();
            animate();
        }

        function buildRoom() {
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x111111, side: THREE.BackSide });
            const room = new THREE.Mesh(new THREE.BoxGeometry(10, 6, 10), wallMat);
            room.position.y = 3; scene.add(room);

            table = new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 2), new THREE.MeshStandardMaterial({color: 0x150d08}));
            table.position.set(0, 0.9, 0.5); table.receiveShadow = true; scene.add(table);

            const win = new THREE.Mesh(new THREE.PlaneGeometry(2, 1.5), new THREE.MeshBasicMaterial({color: 0x050510}));
            win.position.set(0, 2.5, -4.9); scene.add(win);

            const moon = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color: 0xffffcc}));
            moon.position.set(0.4, 2.8, -5.5); scene.add(moon);

            const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 64;
            clockCtx = canvas.getContext('2d');
            clockTex = new THREE.CanvasTexture(canvas);
            const clock = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.4), new THREE.MeshBasicMaterial({map: clockTex}));
            clock.position.set(-2, 3.2, -4.8); scene.add(clock);
        }

        function buildEnemy() {
            enemyGroup = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({color: 0x0a0a0a});
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.5), mat);
            torso.position.y = 1.5; enemyGroup.add(torso);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), mat);
            head.position.y = 2.5; enemyGroup.add(head);
            enemyJaw = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.15, 0.5), mat);
            enemyJaw.position.set(0, 2.25, 0); enemyGroup.add(enemyJaw);
            const hat = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.4), mat);
            hat.position.y = 2.9; enemyGroup.add(hat);
            enemyArm = new THREE.Group(); enemyArm.position.set(0.5, 2.0, 0.1);
            const armM = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.8, 0.15), mat);
            armM.position.y = -0.4; enemyArm.add(armM);
            enemyGroup.add(enemyArm); enemyGroup.position.z = -1.2;
            scene.add(enemyGroup);
        }

        function buildGun() {
            gunGroup = new THREE.Group();
            const gMat = new THREE.MeshStandardMaterial({color: 0x222222, metalness: 1});
            const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.4), gMat);
            barrel.position.z = 0.2; gunGroup.add(barrel);
            cylinderMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.15, 12), gMat);
            cylinderMesh.rotation.x = Math.PI/2; gunGroup.add(cylinderMesh);
            const grip = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.2, 0.08), new THREE.MeshStandardMaterial({color: 0x2a1a0a}));
            grip.position.set(0, -0.15, -0.1); gunGroup.add(grip);
            scene.add(gunGroup);
            updateGunPlacement('TABLE_ENEMY');
        }

        function updateGunPlacement(type) {
            if(type==='TABLE_ENEMY') { scene.attach(gunGroup); gunTargetPos.set(0, 1, -0.2); gunTargetRot.set(0, Math.PI/2, 0); }
            if(type==='TABLE_PLAYER') { scene.attach(gunGroup); gunTargetPos.set(0, 1, 1.2); gunTargetRot.set(0, -Math.PI/2, 0); }
            if(type==='PLAYER_HAND') { camera.attach(gunGroup); gunTargetPos.set(0.3, -0.3, -0.6); gunTargetRot.set(0, Math.PI, 0); }
            if(type==='PLAYER_AIM') { camera.attach(gunGroup); gunTargetPos.set(0, -0.1, -0.4); gunTargetRot.set(0, 0, 0); }
            if(type==='ENEMY_HAND') { enemyArm.attach(gunGroup); gunTargetPos.set(0, -0.9, 0); gunTargetRot.set(Math.PI/2, 0, 0); }
        }

        function startGame() {
            Sound.init();
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('damage-overlay').style.display = 'none';
            currentChamber = 0; bulletPos = Math.floor(Math.random()*5)+1;
            enemyTurn();
        }

        function enemyTurn() {
            state = 'ENEMY'; uiStatus.innerText = "ДИЛЕР ХОДИТ...";
            updateGunPlacement('ENEMY_HAND');
            setTimeout(() => {
                enemyArm.rotation.x = -1.8;
                setTimeout(() => {
                    if(currentChamber === bulletPos) { Sound.play('shot'); finishGame(true); }
                    else { Sound.play('click'); currentChamber++; handoverToPlayer(); }
                }, 1000);
            }, 1000);
        }

        function handoverToPlayer() {
            enemyArm.rotation.x = 0; updateGunPlacement('TABLE_ENEMY');
            setTimeout(() => {
                updateGunPlacement('TABLE_PLAYER');
                uiStatus.innerText = "ВАШ ХОД";
                ctrl.style.display = 'flex'; takeBtn.style.display = 'block';
                spinBtn.style.display = 'none'; shootBtn.style.display = 'none';
            }, 800);
        }

        takeBtn.onclick = () => {
            Sound.play('click'); updateGunPlacement('PLAYER_HAND');
            takeBtn.style.display='none'; spinBtn.style.display='block'; shootBtn.style.display='block';
            state = 'PLAYER_READY';
        };

        spinBtn.onclick = () => {
            Sound.play('spin'); spinBtn.disabled = true;
            let spins = 0;
            const int = setInterval(() => {
                cylinderMesh.rotation.y += 0.6; spins++;
                if(spins > 20) {
                    clearInterval(int); bulletPos = Math.floor(Math.random()*6);
                    currentChamber = 0; spinBtn.disabled = false;
                }
            }, 60);
        };

        shootBtn.onclick = () => {
            state = 'PLAYER_AIMING'; updateGunPlacement('PLAYER_AIM'); ctrl.style.display = 'none';
            setTimeout(() => {
                if(currentChamber === bulletPos) { Sound.play('shot'); showDeath(); finishGame(false); }
                else { Sound.play('click'); currentChamber++; setTimeout(enemyTurn, 1000); }
            }, 800);
        };

        function showDeath() {
            document.getElementById('damage-overlay').style.display = 'block';
            for(let i=0; i<10; i++) {
                const b = document.createElement('div'); b.className = 'blood';
                b.style.width = b.style.height = (Math.random()*150+50)+'px';
                b.style.left = Math.random()*100+'%'; b.style.top = Math.random()*100+'%';
                document.getElementById('damage-overlay').appendChild(b);
            }
        }

        function finishGame(win) {
            state = 'END';
            setTimeout(() => {
                document.getElementById('game-over').style.display = 'flex';
                document.getElementById('go-title').innerText = win ? "ВЫ ПОБЕДИЛИ" : "ВЫ МЕРТВЫ";
                document.getElementById('go-title').style.color = win ? "#0f0" : "#f00";
            }, 1500);
        }

        function animate() {
            requestAnimationFrame(animate);

            // 🎥 ПЛАВНАЯ ТРЯСКА (из кода GPT)
            if(state === 'PLAYER_AIMING'){
                camera.position.x += (Math.random()-0.5)*0.015;
                camera.position.y += (Math.random()-0.5)*0.015;
            } else {
                camera.position.lerp(new THREE.Vector3(0, 1.6, 2.5), 0.1);
            }

            // ⚡ МЕРЦАНИЕ СВЕТА (из кода GPT)
            mainLight.intensity = Math.max(0.8, Math.min(1.4, mainLight.intensity * (0.98 + Math.random()*0.04)));

            gunGroup.position.lerp(gunTargetPos, 0.1);
            gunGroup.quaternion.slerp(new THREE.Quaternion().setFromEuler(gunTargetRot), 0.1);

            const time = new Date();
            clockCtx.fillStyle = '#000'; clockCtx.fillRect(0,0,128,64);
            clockCtx.fillStyle = '#f00'; clockCtx.font = '20px monospace';
            clockCtx.fillText(time.toLocaleTimeString(), 10, 40);
            clockTex.needsUpdate = true;

            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').onclick = startGame;
        init();
    </script>
</body>
</html>
