<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>STAKES: Nightmare AI</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #eee; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* UI ЭЛЕМЕНТЫ */
        #clock-window { position: fixed; top: 20px; left: 20px; padding: 10px; background: rgba(20,0,0,0.8); border: 2px solid #500; font-size: 1.5rem; color: #f00; z-index: 100; box-shadow: 0 0 15px #300; pointer-events: none; }
        #dealer-speech { position: fixed; top: 20%; left: 50%; transform: translateX(-50%); padding: 15px; background: rgba(0,0,0,0.9); border: 1px solid #444; border-radius: 10px; max-width: 300px; color: #fff; font-size: 1.1rem; display: none; z-index: 50; text-align: center; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: flex-end; pointer-events: none; }
        .controls { display: none; justify-content: center; gap: 15px; padding-bottom: 30px; pointer-events: auto; }
        
        button { padding: 12px 25px; font-size: 1rem; font-family: inherit; background: #111; color: #888; border: 1px solid #444; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #300; color: #fff; }
        button:disabled { opacity: 0.3; }

        .btn-group { position: fixed; top: 20px; right: 20px; z-index: 110; display: flex; gap: 10px; pointer-events: auto; }
        #blood-screen { position: absolute; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle, transparent, #900); opacity:0; pointer-events:none; z-index:15; }
    </style>
</head>
<body>

    <div id="clock-window">00:00:00</div>
    <div id="dealer-speech">...</div>
    <div id="blood-screen"></div>

    <div id="ui-layer">
        <div class="controls" id="controls">
            <button id="inspect-btn">ОСМОТР</button>
            <button id="take-btn" style="display:none;">ВЗЯТЬ</button>
            <button id="spin-btn" style="display:none;">КРУТИТЬ</button>
            <button id="eject-btn" style="display:none;">ВЫБРОС (1)</button>
            <button id="shoot-btn" style="display:none;">ВЫСТРЕЛ</button>
        </div>
    </div>

    <div class="btn-group">
        <button id="fs-btn">⛶</button>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        let scene, camera, renderer, gunGroup, cylinderMesh, enemyGroup, enemyArm, enemyHead;
        let mainLight, clockEl = document.getElementById('clock-window');
        let bulletPos = 0, currentChamber = 0, state = 'START';
        let gunTargetPos = new THREE.Vector3(), gunTargetRot = new THREE.Euler();
        let enemyArmTargetRot = new THREE.Euler(0,0,0);
        let ejectsLeft = 1;

        const phrases = [
            "Твой пот воняет страхом, кусок мяса.",
            "Надеюсь, твои мозги хорошо отмоются от стола.",
            "Крути уже, не заставляй меня ждать.",
            "Ты думаешь, удача на твоей стороне? Ошибаешься.",
            "Может, мне просто застрелить тебя сейчас?",
            "Осечка? Какая жалость... для меня."
        ];

        function say(text) {
            const el = document.getElementById('dealer-speech');
            el.innerText = text;
            el.style.display = 'block';
            if (window.speechSynthesis) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ru-RU'; utterance.pitch = 0.5; utterance.rate = 0.8;
                window.speechSynthesis.speak(utterance);
            }
            setTimeout(() => el.style.display = 'none', 3000);
        }

        function updateClock() {
            const now = new Date();
            clockEl.innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 2.5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // СВЕТ
            mainLight = new THREE.PointLight(0xffccaa, 1.2, 10);
            mainLight.position.set(0, 2.8, 1);
            mainLight.castShadow = true;
            scene.add(mainLight);
            scene.add(new THREE.AmbientLight(0x221111, 0.5));

            // ОКРУЖЕНИЕ
            const wallMat = new THREE.MeshStandardMaterial({color: 0x111, roughness: 1});
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(10,10), wallMat);
            floor.rotation.x = -Math.PI/2; scene.add(floor);

            const table = new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 2), new THREE.MeshStandardMaterial({color: 0x22110a}));
            table.position.set(0, 0.9, 0.8); table.receiveShadow = true; scene.add(table);

            buildDealer();
            buildGun();
            animate();
            enemyTurn();
        }

        function buildDealer() {
            enemyGroup = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({color: 0x332211});
            
            // СТУЛ
            const chair = new THREE.Group();
            const seat = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.1, 0.7), mat); seat.position.y = 0.6; chair.add(seat);
            const back = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.8, 0.1), mat); back.position.set(0, 1, -0.3); chair.add(back);
            enemyGroup.add(chair);

            // ТЕЛО
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1, 0.3), mat); torso.position.y = 1.3; enemyGroup.add(torso);
            enemyHead = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.4, 0.3), mat); enemyHead.position.y = 2.1; enemyGroup.add(enemyHead);
            
            enemyArm = new THREE.Group();
            enemyArm.position.set(0.4, 1.8, 0.1);
            const armM = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.7, 0.12), mat); armM.position.y = -0.3; enemyArm.add(armM);
            enemyGroup.add(enemyArm);

            enemyGroup.position.z = -0.5;
            scene.add(enemyGroup);
        }

        function buildGun() {
            gunGroup = new THREE.Group();
            const metal = new THREE.MeshStandardMaterial({color: 0x111, metalness: 0.9});
            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.5), metal);
            barrel.rotation.x = Math.PI/2; barrel.position.z = 0.3; gunGroup.add(barrel);
            cylinderMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.2), metal);
            cylinderMesh.rotation.x = Math.PI/2; gunGroup.add(cylinderMesh);
            scene.add(gunGroup);
            updateGun('TABLE');
        }

        function updateGun(mode) {
            if (mode === 'TABLE') { attach(scene, gunGroup); gunTargetPos.set(0.2, 1, 0.8); gunTargetRot.set(0, 1.5, 0); }
            if (mode === 'PLAYER_INSPECT') { attach(camera, gunGroup); gunTargetPos.set(0, -0.2, -0.5); gunTargetRot.set(0.5, 0.8, 0); }
            if (mode === 'PLAYER_HAND') { attach(camera, gunGroup); gunTargetPos.set(0.4, -0.4, -0.7); gunTargetRot.set(0, 0, 0); }
            if (mode === 'PLAYER_AIM') { attach(camera, gunGroup); gunTargetPos.set(0, -0.1, -0.4); gunTargetRot.set(0, 0, 0); }
            if (mode === 'ENEMY_HAND') { attach(enemyArm, gunGroup); gunTargetPos.set(0, -0.7, 0.1); gunTargetRot.set(Math.PI/2, 0, 0); }
        }

        function attach(parent, child) {
            const wp = new THREE.Vector3(); const wq = new THREE.Quaternion();
            child.getWorldPosition(wp); child.getWorldQuaternion(wq);
            parent.add(child);
            child.position.copy(parent.worldToLocal(wp));
            child.quaternion.copy(wq);
        }

        // ---------- AI ЛОГИКА ----------
        function enemyTurn() {
            state = 'ENEMY';
            document.getElementById('controls').style.display = 'none';
            updateGun('ENEMY_HAND');
            enemyArmTargetRot.set(0,0,0);

            setTimeout(() => {
                const chambersLeft = 6 - currentChamber;
                const risk = 1 / chambersLeft;
                
                if (risk > 0.4 && Math.random() > 0.3) {
                    say("Слишком предсказуемо... Перемешаем.");
                    let s = 0; const i = setInterval(() => { cylinderMesh.rotation.z += 1.2; if(s++>15) clearInterval(i); }, 50);
                    bulletPos = Math.floor(Math.random()*6); currentChamber = 0;
                } else {
                    say(phrases[Math.floor(Math.random()*phrases.length)]);
                }

                setTimeout(() => {
                    enemyArmTargetRot.set(-Math.PI*0.8, 0, -0.4); // Подносит вверх
                    setTimeout(() => {
                        if (currentChamber === bulletPos) {
                            state = 'DEAD';
                            mainLight.color.setHex(0xff0000);
                            enemyGroup.rotation.x = -Math.PI/2.5; // Смерть
                            enemyGroup.position.y -= 0.5;
                            say("А-а-а-гх...");
                        } else {
                            currentChamber++;
                            enemyArmTargetRot.set(0,0,0);
                            setTimeout(playerTurn, 1000);
                        }
                    }, 1200);
                }, 2000);
            }, 1000);
        }

        function playerTurn() {
            state = 'PLAYER_WAIT';
            updateGun('TABLE');
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('inspect-btn').style.display = 'block';
            document.getElementById('take-btn').style.display = 'none';
            document.getElementById('spin-btn').style.display = 'none';
            document.getElementById('shoot-btn').style.display = 'none';
            document.getElementById('eject-btn').style.display = 'none';
        }

        document.getElementById('inspect-btn').onclick = () => {
            updateGun('PLAYER_INSPECT');
            document.getElementById('inspect-btn').style.display = 'none';
            document.getElementById('take-btn').style.display = 'block';
        };

        document.getElementById('take-btn').onclick = () => {
            updateGun('PLAYER_HAND');
            document.getElementById('take-btn').style.display = 'none';
            document.getElementById('spin-btn').style.display = 'block';
            document.getElementById('shoot-btn').style.display = 'block';
            if(ejectsLeft > 0) document.getElementById('eject-btn').style.display = 'block';
        };

        document.getElementById('spin-btn').onclick = () => {
            let s = 0; const i = setInterval(() => { cylinderMesh.rotation.z += 1.2; if(s++>15) clearInterval(i); }, 50);
            bulletPos = Math.floor(Math.random()*6); currentChamber = 0;
            say("Надейся на пустоту, червяк.");
        };

        document.getElementById('eject-btn').onclick = () => {
            ejectsLeft--;
            currentChamber++;
            document.getElementById('eject-btn').style.display = 'none';
            say("Трусливый ход. Но это тебе не поможет.");
        };

        document.getElementById('shoot-btn').onclick = () => {
            updateGun('PLAYER_AIM');
            document.getElementById('controls').style.display = 'none';
            setTimeout(() => {
                if (currentChamber === bulletPos) {
                    document.getElementById('blood-screen').style.opacity = '1';
                    state = 'DEAD';
                    setTimeout(() => location.reload(), 2000);
                } else {
                    currentChamber++;
                    setTimeout(enemyTurn, 1000);
                }
            }, 1000);
        };

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            if (state !== 'DEAD') {
                // Идл-анимация дилера
                enemyGroup.position.y = Math.sin(time) * 0.02;
                enemyHead.rotation.y = Math.sin(time * 0.5) * 0.1;
                mainLight.intensity = 1.0 + Math.random() * 0.2;
            }

            gunGroup.position.lerp(gunTargetPos, 0.1);
            gunGroup.quaternion.slerp(new THREE.Quaternion().setFromEuler(gunTargetRot), 0.1);
            enemyArm.rotation.x += (enemyArmTargetRot.x - enemyArm.rotation.x) * 0.05;
            enemyArm.rotation.z += (enemyArmTargetRot.z - enemyArm.rotation.z) * 0.05;

            renderer.render(scene, camera);
        }

        document.getElementById('fs-btn').onclick = () => {
            document.documentElement.requestFullscreen();
            screen.orientation.lock('landscape').catch(()=>{});
        };

        init();
    </script>
</body>
</html>
