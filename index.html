<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, orientation=landscape">
<title>STAKES: Nightmare AI</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family:monospace; }
#vhs {
    position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,.02) 0px,rgba(0,0,0,.1) 2px,transparent 4px);
    animation:vhs .08s infinite;
}
@keyframes vhs{0%{transform:translateY(0)}100%{transform:translateY(4px)}}
#grain{
    position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:51;
    background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency=".65" numOctaves="3"/></filter><rect width="100" height="100" filter="url(%23n)" opacity=".1"/></svg>');
    opacity:.15;
}
#ui{
    position:fixed;bottom:20px;width:100%;text-align:center;z-index:10;
}
button{
    padding:12px 24px;margin:4px;font-size:16px;background:#111;color:#aaa;border:1px solid #444;
    text-transform:uppercase;cursor:pointer;
}
button:hover:not(:disabled){background:#300;color:#fff;border-color:#f00}
button:disabled{opacity:.3}
#speech{
    position:fixed;top:20%;left:50%;transform:translateX(-50%);z-index:30;
    padding:12px;background:rgba(0,0,0,.9);border:1px solid #444;border-radius:8px;
    max-width:300px;color:#fff;font-size:1.1rem;text-align:center;display:none;
}
#clock{
    position:fixed;top:20px;left:20px;padding:8px;background:rgba(20,0,0,.8);
    border:2px solid #500;color:#f00;font-size:1.4rem;z-index:20;pointer-events:none;
}
#blood{
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:radial-gradient(circle,transparent,#800);opacity:0;pointer-events:none;z-index:15;
    transition:opacity .5s;
}
#rotate-warning{
    position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:999;
    color:#fff;display:none;justify-content:center;align-items:center;font-size:2rem;
    text-transform:uppercase;text-shadow:0 0 20px #f00;
}
</style>
</head>
<body>
<div id="vhs"></div><div id="grain"></div>
<div id="rotate-warning">ПЕРЕВЕРНИТЕ ЭКРАН</div>
<div id="clock"></div>
<div id="speech"></div>
<div id="blood"></div>

<div id="ui">
    <button id="startBtn">ПРИНЯТЬ ПАРИ</button>
    <button id="inspectBtn" style="display:none">ОСМОТР</button>
    <button id="takeBtn" style="display:none">ВЗЯТЬ</button>
    <button id="spinBtn" style="display:none">КРУТИТЬ</button>
    <button id="ejectBtn" style="display:none">ВЫБРОС (1)</button>
    <button id="shootBtn" style="display:none">ВЫСТРЕЛ</button>
</div>

<script type="module">
import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

// ---------- ОСНОВНЫЕ ПЕРЕМЕННЫЕ ----------
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,100);
camera.position.set(0,1.6,2.5);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.prepend(renderer.domElement);

const ambient = new THREE.AmbientLight(0x221111,0.4);
scene.add(ambient);
const lamp = new THREE.PointLight(0xffccaa,1.2,8);
lamp.position.set(0.3,2.0,0.5);
lamp.castShadow = true;
scene.add(lamp);

let gunGroup, cylMesh, bulletPos, currentChamber, state, ejectsLeft;
let enemyGroup, enemyArm, enemyForearm, enemyHead, enemyEyeL, enemyEyeR;
let audioCtx, bgOsc, selectedVoice;

// ---------- ФУНКЦИИ ЗВУКА И ГОЛОСА ----------
function createDistortionCurve(amount=400){
    const k = amount, n = 44100, curve = new Float32Array(n), deg = Math.PI/180;
    for(let i=0;i<n;i++){
        const x = i*2/n-1;
        curve[i] = (3+k)*x*20*deg/(Math.PI+k*Math.abs(x));
    }
    return curve;
}

function initAudio(){
    if(audioCtx) return;
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    bgOsc = audioCtx.createOscillator();
    bgOsc.type = 'sawtooth';
    bgOsc.frequency.value = 45;
    const bgGain = audioCtx.createGain();
    bgGain.gain.value = 0.015;
    bgOsc.connect(bgGain);
    bgGain.connect(audioCtx.destination);
    bgOsc.start();

    const setVoice = ()=>{
        const v = speechSynthesis.getVoices();
        if(v.length){
            selectedVoice = v.find(x=>x.lang.startsWith('ru')&&x.name.includes('Male')) ||
                            v.find(x=>x.lang.startsWith('ru')) || null;
        }
    };
    setVoice();
    speechSynthesis.onvoiceschanged = setVoice;
}

function playSound(type,pos=null){
    if(!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    if(type==='click'){
        o.frequency.value=800; g.gain.value=0.2;
        o.start(); o.stop(audioCtx.currentTime+0.1);
    }else if(type==='shot'){
        o.type='square'; o.frequency.value=60; g.gain.value=1;
        g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+1);
        o.start(); o.stop(audioCtx.currentTime+1);
        if(pos){
            const l = new THREE.PointLight(0xff5500,3,4);
            l.position.copy(pos); scene.add(l);
            setTimeout(()=>scene.remove(l),100);
            spawnShellAndSmoke(pos);
        }
    }
}

function spawnBloodSpray(pos){
    for(let i=0;i<15;i++){
        const d = new THREE.Mesh(
            new THREE.SphereGeometry(0.03,4,4),
            new THREE.MeshBasicMaterial({color:0xaa0000})
        );
        d.position.copy(pos).add(new THREE.Vector3((Math.random()-.5)*.2,(Math.random()-.5)*.2,(Math.random()-.5)*.2));
        scene.add(d);
        const vel = new THREE.Vector3((Math.random()-.5)*3,Math.random()*2+1,(Math.random()-.5)*3);
        const start = performance.now();
        function anim(now){
            const dt = (now-start)/1000;
            if(dt>1.5){ scene.remove(d); return; }
            d.position.x+=vel.x*dt; d.position.y+=vel.y*dt-9.8*dt*dt/2; d.position.z+=vel.z*dt;
            requestAnimationFrame(anim);
        }
        requestAnimationFrame(anim);
    }
}

function spawnShellAndSmoke(pos){
    const shell = new THREE.Mesh(
        new THREE.CylinderGeometry(.03,.03,.08),
        new THREE.MeshStandardMaterial({color:0xbfa035,metalness:.9,roughness:.3})
    );
    shell.position.copy(pos);
    shell.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,0);
    scene.add(shell);
    const vel = new THREE.Vector3((Math.random()-.5)*2,Math.random()*2+1,(Math.random()-.5)*2);
    const start = performance.now();
    function animShell(now){
        const dt = (now-start)/1000;
        if(dt>2){ scene.remove(shell); return; }
        shell.position.x+=vel.x*dt; shell.position.y+=vel.y*dt-9.8*dt*dt/2; shell.position.z+=vel.z*dt;
        requestAnimationFrame(animShell);
    }
    requestAnimationFrame(animShell);

    for(let i=0;i<8;i++){
        const smoke = new THREE.Mesh(
            new THREE.SphereGeometry(.04,4,4),
            new THREE.MeshBasicMaterial({color:0x444,transparent:true,opacity:.6})
        );
        smoke.position.copy(pos).add(new THREE.Vector3((Math.random()-.5)*.1,(Math.random()-.5)*.1,0));
        scene.add(smoke);
        const sStart = performance.now();
        function animSmoke(now){
            const dt = (now-sStart)/1000;
            if(dt>1.5){ scene.remove(smoke); return; }
            smoke.material.opacity = .6*(1-dt/1.5);
            smoke.position.x += (Math.random()-.5)*.01;
            smoke.position.y += .015;
            requestAnimationFrame(animSmoke);
        }
        requestAnimationFrame(animSmoke);
    }
}

function say(text){
    const el = document.getElementById('speech');
    el.textContent=text; el.style.display='block';
    try{
        if(window.speechSynthesis){
            const u = new SpeechSynthesisUtterance(text);
            u.lang='ru-RU'; u.pitch=0.3; u.rate=0.75;
            if(selectedVoice) u.voice = selectedVoice;
            speechSynthesis.speak(u);
        }
        if(audioCtx){
            const dur = text.length*0.09;
            const osc = audioCtx.createOscillator(); osc.type='sawtooth'; osc.frequency.value=65;
            const gain = audioCtx.createGain(); gain.gain.value=0.4;
            const dist = audioCtx.createWaveShaper(); dist.curve=createDistortionCurve(400); dist.oversample='4x';
            const filt = audioCtx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=900;
            const sub = audioCtx.createOscillator(); sub.type='sine'; sub.frequency.value=35;
            const subGain = audioCtx.createGain(); subGain.gain.value=0.25;

            osc.connect(dist); dist.connect(filt); filt.connect(gain); gain.connect(audioCtx.destination);
            sub.connect(subGain); subGain.connect(audioCtx.destination);

            osc.start(); sub.start();
            gain.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
            subGain.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
            osc.stop(audioCtx.currentTime+dur); sub.stop(audioCtx.currentTime+dur);
        }
    }catch(e){}
    setTimeout(()=>el.style.display='none',4000);
}

// ---------- ПОСТРОЕНИЕ СЦЕНЫ ----------
function buildScene(){
    const wallTex = (()=>{
        const c=document.createElement('canvas');c.width=c.height=256;
        const ctx=c.getContext('2d');ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,256,256);
        for(let i=0;i<2000;i++){ctx.fillStyle=`rgb(${Math.random()*30+10},${Math.random()*30+10},${Math.random()*30+10})`;ctx.fillRect(Math.random()*256,Math.random()*256,2,2)}
        return new THREE.CanvasTexture(c);
    })();
    wallTex.wrapS=wallTex.wrapT=THREE.RepeatWrapping;wallTex.repeat.set(2,2);
    const wallMat = new THREE.MeshStandardMaterial({map:wallTex,roughness:0.9});
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(8,8),wallMat);
    floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);
    const back = new THREE.Mesh(new THREE.PlaneGeometry(8,5),new THREE.MeshStandardMaterial({color:0x111,roughness:1}));
    back.position.set(0,2.5,-3);back.receiveShadow=true;scene.add(back);

    // Окно с грозой
    const winCanvas = document.createElement('canvas');winCanvas.width=winCanvas.height=256;
    const winCtx = winCanvas.getContext('2d');
    const winTex = new THREE.CanvasTexture(winCanvas);
    const winMesh = new THREE.Mesh(new THREE.PlaneGeometry(1.8,1.4),new THREE.MeshBasicMaterial({map:winTex}));
    winMesh.position.set(1.2,2.8,-2.95);scene.add(winMesh);
    setInterval(()=>{
        const w=256,h=256;winCtx.fillStyle='#0a0a1a';winCtx.fillRect(0,0,w,h);
        winCtx.fillStyle='#fcc';winCtx.beginPath();winCtx.arc(180,40,30,0,Math.PI*2);winCtx.fill();
        winCtx.fillStyle='#f00';winCtx.beginPath();winCtx.arc(188,35,8,0,Math.PI*2);winCtx.fill();
        winCtx.fillStyle='#fff';for(let i=0;i<30;i++) winCtx.fillRect(Math.random()*w,Math.random()*h*.7,1,1);
        winCtx.strokeStyle='rgba(200,200,255,.4)';winCtx.lineWidth=1;
        const off = performance.now()*.05%40;
        for(let y=-40+off;y<h;y+=20){winCtx.beginPath();winCtx.moveTo(Math.random()*w,y);winCtx.lineTo(Math.random()*w,y+15);winCtx.stroke()}
        if(Math.random()<.02){winCtx.strokeStyle='#ffa';winCtx.lineWidth=2;winCtx.beginPath();winCtx.moveTo(100,0);winCtx.lineTo(90,60);winCtx.lineTo(110,90);winCtx.lineTo(80,140);winCtx.stroke()}
        winMesh.material.map.needsUpdate=true;
    },100);

    const table = new THREE.Mesh(new THREE.BoxGeometry(2.5,.1,1.5),new THREE.MeshStandardMaterial({color:0x150d08,roughness:.8}));
    table.position.set(0,.9,.8);table.castShadow=true;table.receiveShadow=true;scene.add(table);
    const chair = new THREE.Group();
    const wood = new THREE.MeshStandardMaterial({color:0x1a0a05,roughness:.7});
    const seat = new THREE.Mesh(new THREE.BoxGeometry(.7,.05,.7),wood);seat.position.y=.6;chair.add(seat);
    const backC = new THREE.Mesh(new THREE.BoxGeometry(.7,.8,.05),wood);backC.position.set(0,1,-.35);chair.add(backC);
    chair.position.set(0,0,-.85);chair.castShadow=true;chair.receiveShadow=true;scene.add(chair);
}

// ---------- ДИЛЕР ----------
function buildEnemy(){
    enemyGroup = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({color:0x2a1a1a,roughness:.8});
    const thighL = new THREE.Mesh(new THREE.BoxGeometry(.18,.4,.18),mat);thighL.position.set(-.2,.4,0);enemyGroup.add(thighL);
    const thighR = new THREE.Mesh(new THREE.BoxGeometry(.18,.4,.18),mat);thighR.position.set(.2,.4,0);enemyGroup.add(thighR);
    const shinL = new THREE.Mesh(new THREE.BoxGeometry(.15,.35,.15),mat);shinL.position.set(-.2,.05,.15);enemyGroup.add(shinL);
    const shinR = new THREE.Mesh(new THREE.BoxGeometry(.15,.35,.15),mat);shinR.position.set(.2,.05,.15);enemyGroup.add(shinR);
    const torso = new THREE.Mesh(new THREE.BoxGeometry(.5,.9,.3),mat);torso.position.y=1;enemyGroup.add(torso);
    enemyHead = new THREE.Mesh(new THREE.BoxGeometry(.35,.4,.35),mat);enemyHead.position.y=1.75;enemyGroup.add(enemyHead);
    const eyeG = new THREE.SphereGeometry(.06);
    const eyeM = new THREE.MeshStandardMaterial({color:0xf00,emissive:new THREE.Color(0x330000)});
    enemyEyeL = new THREE.Mesh(eyeG,eyeM);enemyEyeL.position.set(-.08,1.85,.16);enemyGroup.add(enemyEyeL);
    enemyEyeR = new THREE.Mesh(eyeG,eyeM);enemyEyeR.position.set(.08,1.85,.16);enemyGroup.add(enemyEyeR);

    const shoulder = new THREE.Group();shoulder.position.set(.3,1.5,.1);
    const upper = new THREE.Mesh(new THREE.BoxGeometry(.1,.45,.1),mat);upper.position.y=-.22;shoulder.add(upper);
    enemyForearm = new THREE.Group();enemyForearm.position.set(0,-.45,0);
    const forearmMesh = new THREE.Mesh(new THREE.BoxGeometry(.08,.35,.08),mat);forearmMesh.position.y=-.17;enemyForearm.add(forearmMesh);
    // пальцы
    const fGeo = new THREE.CylinderGeometry(.025,.025,.08);
    const fMat = new THREE.MeshStandardMaterial({color:0x2a1a1a});
    for(let i=0;i<4;i++){const f=new THREE.Mesh(fGeo,fMat);f.position.set(.03-i*.025,-.35,.04);f.rotation.z=Math.PI/6;enemyForearm.add(f)}
    const thumb = new THREE.Mesh(fGeo,fMat);thumb.position.set(-.05,-.34,.02);thumb.rotation.z=-Math.PI/6;enemyForearm.add(thumb);
    shoulder.add(enemyForearm);
    enemyArm = shoulder;
    enemyGroup.add(enemyArm);
    enemyGroup.position.set(0,.25,-.5);
    scene.add(enemyGroup);
}

// ---------- РЕВОЛЬВЕР ----------
function buildGun(){
    gunGroup = new THREE.Group();
    const metal = new THREE.MeshStandardMaterial({color:0x1a1a1a,metalness:.95,roughness:.3});
    const barrel = new THREE.Mesh(new THREE.CylinderGeometry(.04,.04,.5),metal);
    barrel.rotation.x=Math.PI/2; barrel.position.z=.25; gunGroup.add(barrel);
    cylMesh = new THREE.Mesh(new THREE.CylinderGeometry(.08,.08,.2),metal);
    cylMesh.rotation.x=Math.PI/2; gunGroup.add(cylMesh);
    const grip = new THREE.Mesh(new THREE.BoxGeometry(.07,.2,.1),new THREE.MeshStandardMaterial({color:0x3a2a1a,roughness:.9}));
    grip.position.set(0,-.15,-.15); gunGroup.add(grip);
    scene.add(gunGroup);
    gunGroup.position.set(.2,1,.8);
    gunGroup.rotation.set(0,1.5,0);
}

function safeAttach(parent,child){
    const pos = new THREE.Vector3();
    const quat = new THREE.Quaternion();
    child.getWorldPosition(pos);
    child.getWorldQuaternion(quat);
    if(child.parent) child.parent.remove(child);
    parent.add(child);
    child.position.copy(parent.worldToLocal(pos));
    child.quaternion.copy(quat);
}

function updateGunPos(mode){
    const tp = new THREE.Vector3(), tr = new THREE.Euler();
    switch(mode){
        case 'TABLE': tp.set(.2,1,.8); tr.set(0,1.5,0); safeAttach(scene,gunGroup); break;
        case 'PLAYER_INSPECT': tp.set(0,-.2,-.6); tr.set(.5,.8,0); safeAttach(camera,gunGroup); break;
        case 'PLAYER_HAND': tp.set(.4,-.4,-.7); tr.set(0,0,0); safeAttach(camera,gunGroup); break;
        case 'PLAYER_AIM': tp.set(0,-.1,-.45); tr.set(0,0,0); safeAttach(camera,gunGroup); break;
        case 'ENEMY_HAND': tp.set(0,-.35,.05); tr.set(Math.PI/2,0,0); safeAttach(enemyForearm,gunGroup); break;
    }
    const sp = gunGroup.position.clone(), sq = gunGroup.quaternion.clone();
    const tq = new THREE.Quaternion().setFromEuler(tr);
    const start = performance.now();
    function anim(now){
        const t = Math.min(1, (now-start)/300);
        gunGroup.position.lerpVectors(sp,tp,t);
        gunGroup.quaternion.slerpQuaternions(sq,tq,t);
        if(t<1) requestAnimationFrame(anim);
    }
    requestAnimationFrame(anim);
}

// ---------- ИГРОВАЯ ЛОГИКА ----------
function endGame(won){
    state='END';
    document.querySelectorAll('#ui button:not(#startBtn)').forEach(b=>b.style.display='none');
    document.getElementById('blood').style.opacity = won ? '0' : '1';
    alert(won ? 'ВЫ ПОБЕДИЛИ' : 'ВЫ МЕРТВЫ');
    if(audioCtx?.state==='running') audioCtx.suspend();
    if(bgOsc) bgOsc.stop();
}

function startGame(){
    initAudio();
    if(audioCtx?.state==='suspended') audioCtx.resume();
    bulletPos = Math.floor(Math.random()*6);
    currentChamber = (bulletPos + 1 + Math.floor(Math.random()*5)) % 6; // гарантирует, что первый ход не попадёт
    ejectsLeft = 1;
    document.getElementById('startBtn').style.display='none';
    updateGunPos('TABLE');
    enemyTurn();
}

function enemyTurn(){
    state='ENEMY';
    document.querySelectorAll('#ui button:not(#startBtn)').forEach(b=>b.style.display='none');
    updateGunPos('TABLE');
    setTimeout(()=> updateGunPos('ENEMY_HAND'),600);
    setTimeout(()=>{
        const risk = 1/(6-currentChamber);
        if(risk>0.35 && Math.random()>0.3){
            say("Слишком предсказуемо... Перемешаем.");
            let spins=0;
            const iv = setInterval(()=>{ cylMesh.rotation.z+=1.2; if(++spins>20){clearInterval(iv); bulletPos=Math.floor(Math.random()*6); currentChamber=0; } },60);
        } else {
            say(["Твой пот воняет страхом.","Надеюсь, твои мозги отмоются.","Крути, мразь."][Math.floor(Math.random()*3)]);
        }
        const startAim = performance.now();
        function animAim(now){
            const t = Math.min(1,(now-startAim)/1500);
            enemyArm.rotation.set(-1.1*t, 0.2*t, -1.8*t);
            enemyForearm.rotation.set(-1.5*t,0,0);
            if(t<1) requestAnimationFrame(animAim);
            else {
                if(currentChamber===bulletPos){
                    const pos = new THREE.Vector3(); enemyArm.getWorldPosition(pos);
                    playSound('shot',pos);
                    spawnBloodSpray(pos);
                    enemyGroup.rotation.x = -Math.PI/4;
                    enemyGroup.position.y -= .3;
                    enemyGroup.position.z += .2;
                    say("А-а-гх...");
                    endGame(true);
                } else {
                    playSound('click');
                    currentChamber++;
                    enemyArm.rotation.set(0,0,0);
                    enemyForearm.rotation.set(0,0,0);
                    playerTurn();
                }
            }
        }
        requestAnimationFrame(animAim);
    },2000);
}

function playerTurn(){
    state='PLAYER';
    updateGunPos('TABLE');
    document.getElementById('inspectBtn').style.display='inline';
    document.getElementById('takeBtn').style.display='none';
    document.getElementById('spinBtn').style.display='none';
    document.getElementById('shootBtn').style.display='none';
    document.getElementById('ejectBtn').style.display='none';
}

document.getElementById('startBtn').onclick = startGame;
document.getElementById('inspectBtn').onclick = ()=>{
    updateGunPos('PLAYER_INSPECT');
    document.getElementById('inspectBtn').style.display='none';
    document.getElementById('takeBtn').style.display='inline';
};
document.getElementById('takeBtn').onclick = ()=>{
    updateGunPos('PLAYER_HAND');
    document.getElementById('takeBtn').style.display='none';
    document.getElementById('spinBtn').style.display='inline';
    document.getElementById('shootBtn').style.display='inline';
    if(ejectsLeft) document.getElementById('ejectBtn').style.display='inline';
};
document.getElementById('spinBtn').onclick = ()=>{
    let s=0;
    const iv = setInterval(()=>{ cylMesh.rotation.z+=1.2; if(++s>15){clearInterval(iv); bulletPos=Math.floor(Math.random()*6); currentChamber=0; } },60);
    say("Надейся на пустоту, червяк.");
};
document.getElementById('ejectBtn').onclick = ()=>{
    ejectsLeft--;
    document.getElementById('ejectBtn').style.display='none';
    if(currentChamber===bulletPos){
        say("Ты выбросил патрон! Победа.");
        endGame(true);
    } else {
        currentChamber++;
        playSound('click');
        say("Пусто. Трусливый ход.");
    }
};
document.getElementById('shootBtn').onclick = ()=>{
    updateGunPos('PLAYER_AIM');
    document.querySelectorAll('#ui button:not(#startBtn)').forEach(b=>b.style.display='none');
    setTimeout(()=>{
        if(currentChamber===bulletPos){
            const pos = new THREE.Vector3(); gunGroup.getWorldPosition(pos);
            playSound('shot',pos);
            document.getElementById('blood').style.opacity='1';
            endGame(false);
        } else {
            playSound('click');
            currentChamber++;
            enemyTurn();
        }
    },800);
};

// ---------- ЦИКЛ ----------
function animate(){
    requestAnimationFrame(animate);
    document.getElementById('clock').textContent = new Date().toLocaleTimeString();
    if(state!=='END'){
        enemyEyeL.material.emissiveIntensity = 0.3+Math.sin(Date.now()*.01)*.3;
        enemyEyeR.material.emissiveIntensity = 0.3+Math.cos(Date.now()*.01)*.3;
        lamp.intensity = 1 + Math.random()*.15;
    }
    renderer.render(scene,camera);
}

// ---------- РЕСАЙЗ И ОРИЕНТАЦИЯ ----------
function checkOrientation(){
    document.getElementById('rotate-warning').style.display = (innerHeight>innerWidth) ? 'flex' : 'none';
}
window.addEventListener('resize',()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
    checkOrientation();
});
window.addEventListener('orientationchange', checkOrientation);
checkOrientation();

buildScene();
buildEnemy();
buildGun();
animate();
</script>
</body>
</html>
