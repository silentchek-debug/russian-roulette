<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roulette: The Handover</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; color: white; user-select: none; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        #menu, #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; text-align: center; }
        h1 { font-size: 3rem; color: #ff3333; text-shadow: 0 0 15px red; margin: 10px; }
        .controls { display: none; justify-content: center; gap: 20px; padding-bottom: 40px; pointer-events: auto; }
        button { padding: 15px 30px; font-size: 1.2rem; font-family: inherit; background: #222; color: white; border: 2px solid #444; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #444; border-color: #fff; }
        button:disabled { opacity: 0.3; }
        #status { text-align: center; font-size: 1.5rem; padding-top: 30px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); height: 100px; }
        #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; pointer-events: none; display: none; }
        .blood { position: absolute; background: #600; border-radius: 50%; filter: blur(5px); opacity: 0.8; }
        #orientation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: none; justify-content: center; align-items: center; text-align: center; }
        @media (orientation: portrait) { #orientation { display: flex; } }
    </style>
</head>
<body>

    <div id="orientation"><h2>ПЕРЕВЕРНИТЕ ТЕЛЕФОН</h2></div>

    <div id="menu">
        <h1>STAKES</h1>
        <p>Крути. Передавай. Выживай.</p>
        <button id="start-btn">ПРИНЯТЬ ПАРИ</button>
    </div>

    <div id="game-over">
        <h1 id="go-title">КОНЕЦ</h1>
        <button onclick="location.reload()">ЗАНОВО</button>
    </div>

    <div id="damage-overlay"></div>

    <div id="ui-layer">
        <div id="status"></div>
        <div class="controls" id="controls">
            <button id="take-btn" style="display:none;">Взять пистолет</button>
            <button id="spin-btn">Крутить</button>
            <button id="shoot-btn">Стрелять</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        let scene, camera, renderer, gunGroup, cylinderMesh, enemyGroup, enemyArm, eyeLight, moon;
        let clockTex, clockCtx, cloudGroup;
        let audioCtx, droneOsc;
        let bulletPos = -1, currentChamber = 0, state = 'MENU';
        let gunTargetPos = new THREE.Vector3(), gunTargetRot = new THREE.Euler();

        const uiStatus = document.getElementById('status');
        const ctrl = document.getElementById('controls');
        const takeBtn = document.getElementById('take-btn');
        const spinBtn = document.getElementById('spin-btn');
        const shootBtn = document.getElementById('shoot-btn');

        // --- АУДИО СИСТЕМА ---
        const Sound = {
            init() {
                if(audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                this.startMusic();
            },
            startMusic() {
                const drone = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                drone.type = 'sawtooth';
                drone.frequency.setValueAtTime(40, audioCtx.currentTime);
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass'; filter.frequency.value = 200;
                gain.gain.value = 0.1;
                drone.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
                drone.start();
                
                // Пульсация громкости
                setInterval(() => {
                    gain.gain.exponentialRampToValueAtTime(0.05 + Math.random()*0.1, audioCtx.currentTime + 2);
                }, 2000);
            },
            play(type) {
                if(!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.connect(g); g.connect(audioCtx.destination);
                if(type === 'click') {
                    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
                    g.gain.value = 0.3; osc.start(); osc.stop(audioCtx.currentTime + 0.1);
                } else if(type === 'shot') {
                    osc.type = 'square'; osc.frequency.value = 60;
                    g.gain.setValueAtTime(1, audioCtx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.8);
                } else if(type === 'spin') {
                    for(let i=0; i<15; i++) {
                        setTimeout(() => this.play('click'), i * 60);
                    }
                }
            }
        };

        // --- ИНИЦИАЛИЗАЦИЯ ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.Fog(0x020205, 2, 15);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 2.5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            renderer.domElement.id = 'game-canvas';

            const amb = new THREE.AmbientLight(0x111122, 0.5); scene.add(amb);
            const pLight = new THREE.PointLight(0xffaa88, 1, 10);
            pLight.position.set(0, 3, 0); pLight.castShadow = true; scene.add(pLight);

            buildRoom();
            buildEnemy();
            buildGun();
            animate();
        }

        function buildRoom() {
            // Стены
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 1 });
            const room = new THREE.Mesh(new THREE.BoxGeometry(10, 6, 10), wallMat);
            room.position.y = 3; room.material.side = THREE.BackSide;
            scene.add(room);

            // Окно
            const winGeo = new THREE.PlaneGeometry(3, 2);
            const winMat = new THREE.MeshBasicMaterial({ color: 0x050510 });
            const win = new THREE.Mesh(winGeo, winMat);
            win.position.set(0, 3, -4.95); scene.add(win);

            // Луна
            moon = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), new THREE.MeshBasicMaterial({color: 0xffffcc}));
            moon.position.set(1, 3.5, -6); scene.add(moon);

            // Облака
            cloudGroup = new THREE.Group();
            for(let i=0; i<5; i++) {
                const cloud = new THREE.Mesh(new THREE.BoxGeometry(1, 0.2, 0.1), new THREE.MeshBasicMaterial({color: 0x111122, transparent: true, opacity: 0.5}));
                cloud.position.set(Math.random()*4-2, 2.5+Math.random(), -5.5);
                cloudGroup.add(cloud);
            }
            scene.add(cloudGroup);

            // Стол
            const table = new THREE.Mesh(new THREE.BoxGeometry(4, 0.1, 2.5), new THREE.MeshStandardMaterial({color: 0x1a110a}));
            table.position.set(0, 0.9, 0.5); table.receiveShadow = true; scene.add(table);

            // Часы
            const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 64;
            clockCtx = canvas.getContext('2d');
            clockTex = new THREE.CanvasTexture(canvas);
            const clock = new THREE.Mesh(new THREE.PlaneGeometry(1, 0.5), new THREE.MeshBasicMaterial({map: clockTex}));
            clock.position.set(-2.5, 3.5, -4.9); scene.add(clock);
        }

        function buildEnemy() {
            enemyGroup = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({color: 0x0a0a0a});
            
            // Тело и костюм
            const torso = new THREE.Mesh(new THREE.BoxGeometry(1, 1.4, 0.6), mat);
            torso.position.y = 1.6; enemyGroup.add(torso);
            
            const shirt = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 0.8), new THREE.MeshBasicMaterial({color: 0xeeeeee}));
            shirt.position.set(0, 1.9, 0.31); enemyGroup.add(shirt);

            // Голова
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.8, 0.7), mat);
            head.position.y = 2.8; enemyGroup.add(head);

            // Глаза
            const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.05), new THREE.MeshBasicMaterial({color: 0x220000}));
            eyeL.position.set(-0.15, 2.9, 0.35); enemyGroup.add(eyeL);
            
            const mechEye = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.1), new THREE.MeshBasicMaterial({color: 0xff0000}));
            mechEye.rotation.x = Math.PI/2; mechEye.position.set(0.15, 2.9, 0.35); enemyGroup.add(mechEye);
            eyeLight = new THREE.PointLight(0xff0000, 0.5, 2); eyeLight.position.copy(mechEye.position);
            enemyGroup.add(eyeLight);

            // Рука
            enemyArm = new THREE.Group();
            enemyArm.position.set(0.6, 2.2, 0.2);
            const armMesh = new THREE.Mesh(new THREE.BoxGeometry(0.25, 1, 0.25), mat);
            armMesh.position.y = -0.4; enemyArm.add(armMesh);
            enemyGroup.add(enemyArm);

            enemyGroup.position.z = -1.5;
            scene.add(enemyGroup);
        }

        function buildGun() {
            gunGroup = new THREE.Group();
            const gMat = new THREE.MeshStandardMaterial({color: 0x222222, metalness: 1});
            const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.4), gMat);
            barrel.position.z = 0.2; gunGroup.add(barrel);
            
            cylinderMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.15, 12), gMat);
            cylinderMesh.rotation.x = Math.PI/2; gunGroup.add(cylinderMesh);
            
            const grip = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.2, 0.1), new THREE.MeshStandardMaterial({color: 0x332211}));
            grip.position.set(0, -0.15, -0.1); gunGroup.add(grip);

            scene.add(gunGroup);
            setGunState('TABLE_ENEMY');
        }

        // --- СОСТОЯНИЯ ОРУЖИЯ ---
        function setGunState(s) {
            switch(s) {
                case 'TABLE_ENEMY':
                    scene.attach(gunGroup);
                    gunTargetPos.set(0, 1, -0.5);
                    gunTargetRot.set(0, Math.PI/2, 0);
                    break;
                case 'TABLE_PLAYER':
                    scene.attach(gunGroup);
                    gunTargetPos.set(0, 1, 1);
                    gunTargetRot.set(0, -Math.PI/2, 0);
                    break;
                case 'PLAYER_HAND':
                    camera.attach(gunGroup);
                    gunTargetPos.set(0.3, -0.25, -0.5);
                    gunTargetRot.set(0, Math.PI, 0);
                    break;
                case 'PLAYER_AIM':
                    camera.attach(gunGroup);
                    gunTargetPos.set(0, -0.1, -0.3);
                    gunTargetRot.set(0, 0, 0); // Дуло в экран
                    break;
                case 'ENEMY_HAND':
                    enemyArm.attach(gunGroup);
                    gunTargetPos.set(0, -1, 0.1);
                    gunTargetRot.set(Math.PI/2, 0, 0);
                    break;
            }
        }

        // --- ЛОГИКА ---
        function start() {
            Sound.init();
            document.getElementById('menu').style.display = 'none';
            bulletPos = Math.floor(Math.random() * 6);
            currentChamber = 0;
            enemyTurn();
        }

        function enemyTurn() {
            state = 'ENEMY';
            uiStatus.innerText = "ДИЛЕР ЗАБИРАЕТ ОРУЖИЕ";
            setGunState('ENEMY_HAND');
            
            setTimeout(() => {
                uiStatus.innerText = "ДИЛЕР ЦЕЛИТСЯ";
                enemyArm.rotation.x = -Math.PI * 0.6; // Поднять руку к голове
                
                setTimeout(() => {
                    if(currentChamber === bulletPos) {
                        Sound.play('shot');
                        uiStatus.innerText = "ДИЛЕР ПРОИГРАЛ";
                        state = 'END';
                    } else {
                        Sound.play('click');
                        uiStatus.innerText = "ОСЕЧКА";
                        currentChamber++;
                        setTimeout(pushToPlayer, 1000);
                    }
                }, 1000);
            }, 1000);
        }

        function pushToPlayer() {
            uiStatus.innerText = "ДИЛЕР ВОЗВРАЩАЕТ РЕВОЛЬВЕР";
            enemyArm.rotation.x = 0;
            setGunState('TABLE_ENEMY');
            
            setTimeout(() => {
                setGunState('TABLE_PLAYER'); // Анимация скольжения по столу
                setTimeout(() => {
                    ctrl.style.display = 'flex';
                    takeBtn.style.display = 'block';
                    spinBtn.style.display = 'none';
                    shootBtn.style.display = 'none';
                    uiStatus.innerText = "ВАШ ЧЕРЕД";
                }, 1000);
            }, 800);
        }

        takeBtn.onclick = () => {
            Sound.play('click');
            setGunState('PLAYER_HAND');
            takeBtn.style.display = 'none';
            spinBtn.style.display = 'block';
            shootBtn.style.display = 'block';
            state = 'PLAYER_READY';
        };

        spinBtn.onclick = () => {
            Sound.play('spin');
            spinBtn.disabled = true;
            let spins = 0;
            const interval = setInterval(() => {
                cylinderMesh.rotation.y += 0.5;
                spins++;
                if(spins > 20) {
                    clearInterval(interval);
                    bulletPos = Math.floor(Math.random()*6);
                    currentChamber = 0;
                    spinBtn.disabled = false;
                    uiStatus.innerText = "БАРАБАН ПРОКРУЧЕН";
                }
            }, 50);
        };

        shootBtn.onclick = () => {
            state = 'PLAYER_AIMING';
            setGunState('PLAYER_AIM');
            ctrl.style.display = 'none';
            
            setTimeout(() => {
                if(currentChamber === bulletPos) {
                    Sound.play('shot');
                    showDeath();
                } else {
                    Sound.play('click');
                    currentChamber++;
                    uiStatus.innerText = "ВЫЖИЛ";
                    setTimeout(() => {
                        enemyTurn();
                    }, 1000);
                }
            }, 800);
        };

        function showDeath() {
            document.getElementById('damage-overlay').style.display = 'block';
            for(let i=0; i<10; i++) {
                const b = document.createElement('div');
                b.className = 'blood';
                b.style.width = b.style.height = (Math.random()*150+50)+'px';
                b.style.left = Math.random()*100+'%';
                b.style.top = Math.random()*100+'%';
                document.getElementById('damage-overlay').appendChild(b);
            }
            setTimeout(() => {
                document.getElementById('game-over').style.display = 'flex';
            }, 1000);
        }

        // --- ЦИКЛ ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Плавное движение пистолета
            gunGroup.position.lerp(gunTargetPos, 0.1);
            gunGroup.quaternion.slerp(new THREE.Quaternion().setFromEuler(gunTargetRot), 0.1);

            // Часы
            const now = new Date();
            clockCtx.fillStyle = '#000'; clockCtx.fillRect(0,0,128,64);
            clockCtx.fillStyle = '#f00'; clockCtx.font = '20px monospace';
            clockCtx.fillText(now.toLocaleTimeString(), 10, 40);
            clockTex.needsUpdate = true;

            // Окно и облака
            cloudGroup.children.forEach(c => {
                c.position.x += 0.002;
                if(c.position.x > 3) c.position.x = -3;
            });

            // Эффект безумия (дрожание камеры)
            if(state === 'PLAYER_AIMING') {
                camera.position.x = Math.sin(Date.now()*0.1) * 0.01;
                camera.position.y = 1.6 + Math.cos(Date.now()*0.15) * 0.01;
            } else {
                camera.position.x = 0; camera.position.y = 1.6;
            }

            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').onclick = start;
        init();
    </script>
</body>
</html>
